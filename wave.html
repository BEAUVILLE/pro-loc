<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>DIGIY LOC — Déclarations Wave</title>
  <meta name="theme-color" content="#052e16"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./guard.js?v=loc-wave-clean-v4"></script>

  <style>
    :root{
      --bg:#061b14;
      --bg2:#032219;
      --card:#0b2a1f;
      --line:rgba(255,255,255,.14);
      --text:#eafff1;
      --muted:rgba(234,255,241,.75);
      --ok:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --gold:#facc15;
      --radius:18px;
      --shadow:0 22px 55px rgba(0,0,0,.45);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Outfit",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(900px 520px at 12% -10%, rgba(250,204,21,.10), transparent 60%),
        radial-gradient(900px 520px at 90% 0%, rgba(34,197,94,.10), transparent 60%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      color:var(--text);
    }

    .wrap{
      max-width:1050px;
      margin:0 auto;
      padding:16px;
    }

    .card{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:var(--shadow);
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .muted{
      color:var(--muted);
      font-weight:850;
      line-height:1.35;
    }

    .btn{
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      color:var(--text);
      padding:10px 12px;
      border-radius:14px;
      cursor:pointer;
      font-weight:1000;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:44px;
      user-select:none;
      transition:transform .12s ease, opacity .12s ease, border-color .12s ease;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn.ok{border-color:rgba(34,197,94,.6);background:rgba(34,197,94,.08)}
    .btn.gold{border-color:rgba(250,204,21,.55);background:rgba(250,204,21,.08);color:#fde68a}
    .btn.bad{border-color:rgba(239,68,68,.55);background:rgba(239,68,68,.08)}
    .btn.ghost{background:rgba(255,255,255,.01)}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .pill{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:8px 10px;
      border:1px solid rgba(148,163,184,.22);
      border-radius:999px;
      background:rgba(0,0,0,.16);
      color:var(--muted);
      font-weight:950;
      font-size:.86rem;
      white-space:nowrap;
    }

    .pill.ok{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.08);color:#bbf7d0}
    .pill.warn{border-color:rgba(250,204,21,.35);background:rgba(250,204,21,.08);color:#fde68a}
    .pill.bad{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.08);color:#fecaca}

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }

    .note{
      margin-top:12px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(148,163,184,.25);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      font-weight:900;
      white-space:pre-wrap;
      display:none;
      line-height:1.4;
    }

    .note.ok{display:block;border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.09);color:#bbf7d0}
    .note.bad{display:block;border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.09);color:#fecaca}
    .note.warn{display:block;border-color:rgba(250,204,21,.35);background:rgba(250,204,21,.09);color:#fde68a}

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:14px;
    }

    .it{
      border:1px solid rgba(148,163,184,.18);
      background:rgba(0,0,0,.16);
      border-radius:14px;
      padding:12px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .itL{min-width:260px}
    .itTitle{font-weight:1100}
    .itMeta{
      margin-top:4px;
      color:var(--muted);
      font-weight:850;
      font-size:.92rem;
      line-height:1.4;
    }

    .itR{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 9px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.18);
      background:rgba(255,255,255,.02);
      color:var(--muted);
      font-weight:950;
      font-size:.82rem;
    }

    .badge.ok{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.08);color:#bbf7d0}
    .badge.warn{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.08);color:#fed7aa}
    .badge.bad{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.08);color:#fecaca}

    .kpis{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:12px;
    }

    .kpi{
      border:1px solid rgba(148,163,184,.22);
      border-radius:16px;
      padding:12px;
      background:rgba(0,0,0,.12);
    }

    .kpi .big{
      font-weight:1100;
      font-size:1.2rem;
      margin-top:6px;
    }

    .empty{
      border:1px dashed rgba(148,163,184,.22);
      border-radius:14px;
      padding:14px;
      background:rgba(255,255,255,.02);
      color:var(--muted);
      text-align:center;
      font-weight:900;
    }

    @media (max-width:820px){
      .kpis{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row">
        <div>
          <div style="font-weight:1100;font-size:1.1rem">💳 Déclarations Wave LOC</div>
          <div class="muted" id="sub">Vérification de l’accès…</div>
        </div>

        <div class="row" style="justify-content:flex-end">
          <span class="pill mono" id="pillSlug">identifiant : —</span>
          <span class="pill warn" id="pillMode">aperçu</span>
          <a class="btn ghost" id="btnPin" href="./pin.html">🔐 Entrer avec mon PIN</a>
          <a class="btn gold" id="btnBack" href="./app.html">🏠 Ma gestion</a>
          <button class="btn ok" id="btnReload" type="button">↻ Recharger</button>
        </div>
      </div>

      <div class="kpis">
        <div class="kpi">
          <div class="muted">Total déclarations</div>
          <div class="big" id="kTotal">0</div>
        </div>
        <div class="kpi">
          <div class="muted">Non vues</div>
          <div class="big" id="kUnseen">0</div>
        </div>
        <div class="kpi">
          <div class="muted">Montant cumulé</div>
          <div class="big" id="kAmount">0 F</div>
        </div>
      </div>

      <div class="note warn" id="note"></div>
      <div class="list" id="list"></div>
    </div>
  </div>

<script>
(async function(){
  "use strict";

  const MODULE = "LOC";
  const $ = (id) => document.getElementById(id);

  let ROWS = [];
  let SB_FALLBACK = null;

  try{
    window.DIGIY_GUARD?.boot?.({
      module: "LOC",
      login: "./pin.html",
      dashboard: "./wave.html",
      requireSlug: true,
      checkSubscription: true
    });
  }catch{}

  function show(msg, cls){
    const el = $("note");
    el.className = "note " + (cls || "warn");
    el.textContent = msg || "";
    el.style.display = msg ? "block" : "none";
  }

  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function buildSafeUrl(path, params){
    try{
      const u = new URL(path, location.href);
      const entries = Object.entries(params || {});
      for(const [key, value] of entries){
        if(value !== undefined && value !== null && String(value).trim() !== ""){
          u.searchParams.set(key, String(value));
        }
      }
      if(u.origin === location.origin){
        return u.pathname + u.search + u.hash;
      }
      return u.toString();
    }catch{
      let out = String(path || "");
      const qp = new URLSearchParams();
      const entries = Object.entries(params || {});
      for(const [key, value] of entries){
        if(value !== undefined && value !== null && String(value).trim() !== ""){
          qp.set(key, String(value));
        }
      }
      const tail = qp.toString();
      if(!tail) return out;
      return out + (out.includes("?") ? "&" : "?") + tail;
    }
  }

  function getGuardState(){
    return window.DIGIY_GUARD?.state || {
      preview: true,
      access_ok: false,
      slug: "",
      phone: "",
      reason: "guard_missing"
    };
  }

  async function waitGuardReady(){
    if(!window.DIGIY_GUARD) throw new Error("guard_missing");

    const ready = window.DIGIY_GUARD.ready;

    if(typeof ready === "function"){
      const out = ready(8000);
      if(out && typeof out.then === "function") return await out;
      return out;
    }

    if(ready && typeof ready.then === "function") return await ready;
    if(ready) return true;

    throw new Error("guard_not_ready");
  }

  function getSession(){
    try{
      return window.DIGIY_GUARD?.getSession?.() || null;
    }catch{
      return null;
    }
  }

  function storageGet(key){
    try{
      const s = sessionStorage.getItem(key);
      if(s) return s;
    }catch{}
    try{
      const l = localStorage.getItem(key);
      if(l) return l;
    }catch{}
    return "";
  }

  function getSlug(){
    const st = getGuardState();
    if(st.slug) return String(st.slug).trim().toLowerCase();

    try{
      const q = new URL(location.href).searchParams.get("slug");
      if(q) return String(q).trim().toLowerCase();
    }catch{}

    return String(
      storageGet("digiy_loc_slug") ||
      storageGet("digiy_last_slug") ||
      storageGet("DIGIY_SLUG") ||
      ""
    ).trim().toLowerCase();
  }

  function getPhone(){
    const st = getGuardState();
    const sess = getSession();

    return String(
      sess?.phone ||
      st.phone ||
      storageGet("DIGIY_PHONE") ||
      storageGet("DIGIY_LOC_PHONE") ||
      ""
    ).trim();
  }

  function digitsOnly(v){
    return String(v || "").replace(/\D/g, "");
  }

  function resolvePin4(){
    const sess = getSession();

    const direct =
      sess?.pin4 ||
      sess?.owner_pin4 ||
      sess?.pin_4 ||
      storageGet("DIGIY_LOC_PIN4") ||
      storageGet("digiy_loc_pin4") ||
      storageGet("DIGIY_PIN4") ||
      "";

    const clean = digitsOnly(direct);
    if(clean.length >= 4) return clean.slice(-4);

    const phone = getPhone();
    const d = digitsOnly(phone);
    return d ? d.slice(-4) : "";
  }

  function withIdentifier(url){
    const identifier = getSlug();
    if(!identifier) return url;
    return buildSafeUrl(url, { slug: identifier });
  }

  function fmtMoney(x){
    return Number(x || 0).toLocaleString("fr-FR") + " F";
  }

  function fmtDate(x){
    if(!x) return "—";
    try{
      return new Date(x).toLocaleString("fr-FR");
    }catch{
      return String(x);
    }
  }

  function normalizeAmount(row){
    const v =
      row?.amount ??
      row?.amount_fcfa ??
      row?.amount_xof ??
      row?.montant ??
      row?.montant_fcfa ??
      0;

    const n = Number(v);
    return Number.isFinite(n) ? n : 0;
  }

  function getSB(){
    const fromGuard =
      window.DIGIY_GUARD?.getSb?.() ||
      window.DIGIY_GUARD?.getSupabase?.() ||
      window.DIGIY_GUARD?.sb ||
      window.sb ||
      null;

    if(fromGuard && typeof fromGuard.rpc === "function"){
      return fromGuard;
    }

    if(!SB_FALLBACK){
      if(!window.supabase || !window.DIGIY_SUPABASE_URL || !(window.DIGIY_SUPABASE_ANON_KEY || window.DIGIY_SUPABASE_ANON)){
        return null;
      }

      SB_FALLBACK = window.supabase.createClient(
        window.DIGIY_SUPABASE_URL,
        window.DIGIY_SUPABASE_ANON_KEY || window.DIGIY_SUPABASE_ANON,
        {
          auth:{
            persistSession:false,
            autoRefreshToken:false,
            detectSessionInUrl:false
          }
        }
      );
    }

    return SB_FALLBACK;
  }

  function setMode(mode){
    const pill = $("pillMode");

    if(mode === "live"){
      pill.textContent = "actif";
      pill.className = "pill ok";
    }else{
      pill.textContent = "aperçu";
      pill.className = "pill warn";
    }
  }

  function render(){
    const list = $("list");
    list.innerHTML = "";

    if(!ROWS.length){
      list.innerHTML = `
        <div class="empty">
          Aucune déclaration pour l’instant.
        </div>
      `;
    }else{
      ROWS.forEach((r) => {
        const seen = !!r.seen_by_owner;
        const amount = normalizeAmount(r);

        const div = document.createElement("div");
        div.className = "it";
        div.innerHTML = `
          <div class="itL">
            <div class="itTitle">${esc(fmtMoney(amount))} • ${esc(r.client_name || "Client inconnu")}</div>
            <div class="itMeta">
              📅 ${esc(fmtDate(r.created_at))}<br>
              📞 ${esc(r.client_phone || "—")}<br>
              📝 ${esc(r.note || "—")}
            </div>
          </div>
          <div class="itR">
            <span class="badge ${seen ? "ok" : "warn"}">${seen ? "Vue" : "Non vue"}</span>
            ${seen ? "" : `<button class="btn ok" data-seen="${esc(r.id)}" type="button">✅ Marquer comme vue</button>`}
          </div>
        `;
        list.appendChild(div);
      });

      list.querySelectorAll("[data-seen]").forEach((b) => {
        b.addEventListener("click", async () => {
          const id = b.getAttribute("data-seen");
          const sb = getSB();
          const slug = getSlug();
          const phone = getPhone();
          const pin4 = resolvePin4();

          if(!sb || !slug || !phone || !pin4){
            show("❌ Données de session insuffisantes pour marquer cette ligne comme vue.", "bad");
            return;
          }

          b.disabled = true;

          try{
            const { data, error } = await sb.rpc("loc_wave_payment_mark_seen", {
              p_slug: slug,
              p_phone: phone,
              p_pin4: pin4,
              p_id: id
            });

            if(error) throw error;
            if(!data?.ok) throw new Error(data?.error || "mark_seen_failed");

            show("✅ Déclaration marquée comme vue.", "ok");
            await loadRows();
          }catch(e){
            b.disabled = false;
            show("❌ Impossible de marquer cette déclaration comme vue.\n" + String(e?.message || e), "bad");
          }
        });
      });
    }

    const total = ROWS.length;
    const unseen = ROWS.filter(x => !x.seen_by_owner).length;
    const amount = ROWS.reduce((s, x) => s + normalizeAmount(x), 0);

    $("kTotal").textContent = String(total);
    $("kUnseen").textContent = String(unseen);
    $("kAmount").textContent = fmtMoney(amount);
  }

  async function loadRows(){
    const sb = getSB();
    const slug = getSlug();
    const phone = getPhone();
    const pin4 = resolvePin4();

    if(!sb){
      show("❌ Connexion de lecture indisponible.", "bad");
      return;
    }
    if(!slug){
      show("❌ Identifiant manquant.", "bad");
      return;
    }
    if(!phone){
      show("❌ Téléphone de session introuvable.", "bad");
      return;
    }
    if(!pin4){
      show("❌ PIN introuvable pour cette session.", "bad");
      return;
    }

    show("⏳ Chargement des déclarations…", "warn");

    try{
      const { data, error } = await sb.rpc("loc_wave_payments_list", {
        p_slug: slug,
        p_phone: phone,
        p_pin4: pin4
      });

      if(error) throw error;
      if(!data?.ok) throw new Error(data?.error || "list_failed");

      ROWS = Array.isArray(data.rows) ? data.rows.slice() : [];
      ROWS.sort((a, b) => String(b.created_at || "").localeCompare(String(a.created_at || "")));

      render();

      const sess = getSession();
      const pinSource =
        (sess?.pin4 || sess?.owner_pin4 || sess?.pin_4)
          ? "session"
          : "repli téléphone";

      show(
        "✅ Déclarations chargées.\n" +
        `identifiant : ${slug}\n` +
        `téléphone : ${phone}\n` +
        `source PIN : ${pinSource}`,
        "ok"
      );
    }catch(e){
      ROWS = [];
      render();
      show("❌ Impossible de charger les déclarations.\n" + String(e?.message || e), "bad");
    }
  }

  async function init(){
    const slug = getSlug();

    $("pillSlug").textContent = "identifiant : " + (slug || "—");
    $("btnBack").href = withIdentifier("./app.html");
    $("btnPin").href = withIdentifier("./pin.html");
    $("btnReload").addEventListener("click", loadRows);

    if(!window.DIGIY_GUARD || !window.DIGIY_GUARD.ready){
      setMode("preview");
      $("sub").textContent = "Aperçu — sécurité non chargée";
      show("❌ La sécurité de la page n’est pas chargée.", "bad");
      render();
      return;
    }

    try{
      await waitGuardReady();
    }catch{
      setMode("preview");
      $("sub").textContent = "Aperçu — vérification incomplète";
      show("❌ La vérification de l’accès n’a pas pu aller au bout.", "bad");
      render();
      return;
    }

    const st = getGuardState();

    if(!getSlug()){
      setMode("preview");
      $("sub").textContent = "Aperçu — identifiant manquant";
      show("👁️ Ouvre cette page avec un identifiant valide.", "warn");
      render();
      return;
    }

    if(!st.access_ok){
      setMode("preview");
      $("sub").textContent = "Aperçu — accès non confirmé";
      show("👁️ Accès non confirmé. Passe par ton code.", "warn");
      render();
      return;
    }

    setMode("live");
    $("sub").textContent = "✅ Accès confirmé — lecture des déclarations";
    await loadRows();
  }

  init();
})();
</script>
</body>
</html>
