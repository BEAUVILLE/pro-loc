<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>DIGIY LOC PRO — Déclarations Wave</title>
  <meta name="theme-color" content="#052e16"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./guard.js?v=loc-wave-001"></script>

  <style>
    :root{
      --bg:#061b14;
      --bg2:#032219;
      --card:#0b2a1f;
      --line:rgba(255,255,255,.14);
      --text:#eafff1;
      --muted:rgba(234,255,241,.75);
      --ok:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --gold:#facc15;
      --radius:18px;
      --shadow:0 22px 55px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:
        radial-gradient(900px 520px at 12% -10%, rgba(250,204,21,.10), transparent 60%),
        radial-gradient(900px 520px at 90% 0%, rgba(34,197,94,.10), transparent 60%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      color:var(--text);
    }
    .wrap{max-width:1050px;margin:0 auto;padding:16px}
    .card{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:var(--shadow);
    }
    .row{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .muted{color:var(--muted);font-weight:850;line-height:1.35}
    .btn{
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      color:var(--text);
      padding:10px 12px;
      border-radius:14px;
      cursor:pointer;
      font-weight:1000;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:44px;
      user-select:none;
    }
    .btn.ok{border-color:rgba(34,197,94,.6);background:rgba(34,197,94,.08)}
    .btn.gold{border-color:rgba(250,204,21,.55);background:rgba(250,204,21,.08);color:#fde68a}
    .btn.bad{border-color:rgba(239,68,68,.55);background:rgba(239,68,68,.08)}
    .pill{
      display:inline-flex;gap:8px;align-items:center;
      padding:8px 10px;border:1px solid rgba(148,163,184,.22);
      border-radius:999px;background:rgba(0,0,0,.16);
      color:var(--muted);font-weight:950;font-size:.86rem;white-space:nowrap;
    }
    .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace}
    .note{
      margin-top:12px;padding:10px 12px;border-radius:14px;border:1px solid rgba(148,163,184,.25);
      background:rgba(255,255,255,.03);color:var(--muted);font-weight:900;white-space:pre-wrap;display:none;
    }
    .note.ok{display:block;border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.09);color:#bbf7d0}
    .note.bad{display:block;border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.09);color:#fecaca}
    .note.warn{display:block;border-color:rgba(250,204,21,.35);background:rgba(250,204,21,.09);color:#fde68a}
    .list{display:flex;flex-direction:column;gap:10px;margin-top:14px}
    .it{
      border:1px solid rgba(148,163,184,.18);
      background:rgba(0,0,0,.16);
      border-radius:14px;
      padding:12px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .itL{min-width:260px}
    .itTitle{font-weight:1100}
    .itMeta{margin-top:4px;color:var(--muted);font-weight:850;font-size:.92rem;line-height:1.4}
    .itR{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .badge{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 9px;border-radius:999px;
      border:1px solid rgba(148,163,184,.18);
      background:rgba(255,255,255,.02);
      color:var(--muted);font-weight:950;font-size:.82rem;
    }
    .badge.ok{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.08);color:#bbf7d0}
    .badge.warn{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.08);color:#fed7aa}
    .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
    .kpi{
      border:1px solid rgba(148,163,184,.22);
      border-radius:16px;padding:12px;background:rgba(0,0,0,.12);
    }
    .kpi .big{font-weight:1100;font-size:1.2rem;margin-top:6px}
    @media(max-width:820px){ .kpis{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row">
        <div>
          <div style="font-weight:1100;font-size:1.1rem">💳 Déclarations Wave LOC</div>
          <div class="muted" id="sub">Vérification accès…</div>
        </div>
        <div class="row" style="justify-content:flex-end">
          <span class="pill mono" id="pillSlug">slug: —</span>
          <a class="btn gold" id="btnBack" href="./app.html">🏠 Cockpit</a>
          <button class="btn ok" id="btnReload" type="button">↻ Recharger</button>
        </div>
      </div>

      <div class="kpis">
        <div class="kpi">
          <div class="muted">Total déclarations</div>
          <div class="big" id="kTotal">—</div>
        </div>
        <div class="kpi">
          <div class="muted">Non vues</div>
          <div class="big" id="kUnseen">—</div>
        </div>
        <div class="kpi">
          <div class="muted">Montant cumulé</div>
          <div class="big" id="kAmount">—</div>
        </div>
      </div>

      <div class="note warn" id="note"></div>
      <div class="list" id="list"></div>
    </div>
  </div>

<script>
(async function(){
  "use strict";

  const $ = (id)=>document.getElementById(id);
  let UX_MODE = "preview";
  let ROWS = [];

  function show(msg, cls){
    const el = $("note");
    el.className = "note " + (cls || "warn");
    el.textContent = msg || "";
    el.style.display = msg ? "block" : "none";
  }

  function getGuardState(){
    return window.DIGIY_GUARD?.state || {
      preview: true,
      access_ok: false,
      slug: "",
      phone: "",
      reason: "guard_missing"
    };
  }

  function getSlug(){
    const st = getGuardState();
    if(st.slug) return String(st.slug).trim();
    try{
      return String(new URL(location.href).searchParams.get("slug") || "").trim().toLowerCase();
    }catch{
      return "";
    }
  }

  function getPhone(){
    const st = getGuardState();
    return String(
      st.phone ||
      localStorage.getItem("DIGIY_PHONE") ||
      localStorage.getItem("DIGIY_LOC_PHONE") ||
      ""
    ).trim();
  }

  function digitsOnly(v){
    return String(v || "").replace(/\D/g, "");
  }

  function pin4FromPhone(phone){
    const d = digitsOnly(phone);
    return d ? d.slice(-4) : "";
  }

  function withSlug(url){
    const slug = getSlug();
    if(!slug) return url;
    try{
      const u = new URL(url, location.href);
      if(!u.searchParams.get("slug")) u.searchParams.set("slug", slug);
      if(u.origin === location.origin) return u.pathname + u.search + u.hash;
      return u.toString();
    }catch{
      const sep = url.includes("?") ? "&" : "?";
      return url + sep + "slug=" + encodeURIComponent(slug);
    }
  }

  function fmtMoney(x){
    return Number(x || 0).toLocaleString("fr-FR") + " F";
  }

  function fmtDate(x){
    if(!x) return "—";
    try{
      return new Date(x).toLocaleString("fr-FR");
    }catch{
      return String(x);
    }
  }

  function getSB(){
    return window.DIGIY_GUARD?.getSb?.() || window.sb || null;
  }

  function render(){
    const list = $("list");
    list.innerHTML = "";

    if(!ROWS.length){
      list.innerHTML = `
        <div class="it">
          <div class="itL">
            <div class="itTitle">— aucune déclaration —</div>
            <div class="itMeta">Rien pour l’instant.</div>
          </div>
          <div class="itR">
            <span class="badge">Vide</span>
          </div>
        </div>
      `;
    } else {
      ROWS.forEach((r)=>{
        const seen = !!r.seen_by_owner;

        const div = document.createElement("div");
        div.className = "it";
        div.innerHTML = `
          <div class="itL">
            <div class="itTitle">${fmtMoney(r.amount)} • ${r.client_name || "Client inconnu"}</div>
            <div class="itMeta">
              📅 ${fmtDate(r.created_at)}<br>
              📞 ${r.client_phone || "—"}<br>
              📝 ${r.note || "—"}
            </div>
          </div>
          <div class="itR">
            <span class="badge ${seen ? "ok" : "warn"}">${seen ? "Vue" : "Non vue"}</span>
            ${seen ? "" : `<button class="btn ok" data-seen="${r.id}" type="button">✅ Marquer vu</button>`}
          </div>
        `;
        list.appendChild(div);
      });

      list.querySelectorAll("[data-seen]").forEach((b)=>{
        b.addEventListener("click", async ()=>{
          const id = b.getAttribute("data-seen");
          const sb = getSB();
          const slug = getSlug();
          const phone = getPhone();
          const pin4 = pin4FromPhone(phone);

          if(!sb || !slug || !phone || !pin4){
            show("❌ Données session manquantes.", "bad");
            return;
          }

          b.disabled = true;
          try{
            const { data, error } = await sb.rpc("loc_wave_payment_mark_seen", {
              p_slug: slug,
              p_phone: phone,
              p_pin4: pin4,
              p_id: id
            });

            if(error) throw error;
            if(!data?.ok) throw new Error(data?.error || "mark_seen_failed");

            show("✅ Déclaration marquée comme vue.", "ok");
            await loadRows();
          }catch(e){
            show("❌ Impossible de marquer comme vue.\n" + String(e?.message || e), "bad");
            b.disabled = false;
          }
        });
      });
    }

    const total = ROWS.length;
    const unseen = ROWS.filter(x => !x.seen_by_owner).length;
    const amount = ROWS.reduce((s,x)=> s + Number(x.amount || 0), 0);

    $("kTotal").textContent = String(total);
    $("kUnseen").textContent = String(unseen);
    $("kAmount").textContent = fmtMoney(amount);
  }

  async function loadRows(){
    const sb = getSB();
    const slug = getSlug();
    const phone = getPhone();
    const pin4 = pin4FromPhone(phone);

    if(!sb){
      show("❌ Supabase non prêt.", "bad");
      return;
    }
    if(!slug){
      show("❌ slug manquant.", "bad");
      return;
    }
    if(!phone){
      show("❌ téléphone session manquant.", "bad");
      return;
    }
    if(!pin4){
      show("❌ pin4 manquant.", "bad");
      return;
    }

    show("⏳ Chargement…", "warn");

    try{
      const { data, error } = await sb.rpc("loc_wave_payments_list", {
        p_slug: slug,
        p_phone: phone,
        p_pin4: pin4
      });

      if(error) throw error;
      if(!data?.ok) throw new Error(data?.error || "list_failed");

      ROWS = Array.isArray(data.rows) ? data.rows : [];
      render();
      show("✅ Déclarations chargées.", "ok");

    }catch(e){
      ROWS = [];
      render();
      show("❌ Chargement impossible.\n" + String(e?.message || e), "bad");
    }
  }

  async function init(){
    $("pillSlug").textContent = "slug: " + (getSlug() || "—");
    $("btnBack").href = withSlug("./app.html");

    $("btnReload").addEventListener("click", loadRows);

    if(!window.DIGIY_GUARD || !window.DIGIY_GUARD.ready){
      show("❌ Guard absent ou non chargé.", "bad");
      return;
    }

    try{
      await window.DIGIY_GUARD.ready;
    }catch(e){
      show("❌ Guard non prêt.", "bad");
      return;
    }

    const st = getGuardState();

    if(!getSlug()){
      UX_MODE = "preview";
      $("sub").textContent = "Aperçu — slug manquant";
      show("👁️ Ouvre la page avec un slug valide.", "warn");
      render();
      return;
    }

    if(!st.access_ok){
      UX_MODE = "preview";
      $("sub").textContent = "Aperçu — accès non actif";
      show("👁️ Accès non actif. Passe par PIN.", "warn");
      render();
      return;
    }

    UX_MODE = "live";
    $("sub").textContent = "✅ Accès confirmé — lecture des déclarations";
    await loadRows();
  }

  init();
})();
</script>
</body>
</html>
