  <script>
    (function(){
      "use strict";
      var SESSION_KEYS=["DIGIY_LOC_PRO_SESSION_V1","DIGIY_LOC_SESSION","DIGIY_LOC_PIN_SESSION","DIGIY_SESSION_LOC","digiy_loc_session","digiy_loc_slug","digiy_loc_last_slug"];
      var DRAFT_KEYS=["DIGIY_LOC_PAY_BRIDGE","DIGIY_PAY_PENDING_MOVEMENT","DIGIY_LOC_LATEST_ACTION","DIGIY_LOC_GO_LATEST","DIGIY_LOC_ACTION_LATEST","DIGIY_LOC_LAST_DRAFT","DIGIY_LOC_PENDING_NOTE","DIGIY_LOC_PENDING_PLANNING","DIGIY_LOC_ACTION_NOTES","DIGIY_LOC_ACTION_PLANNING","DIGIY_LOC_PAY_HANDOFF"];
      function $(id){return document.getElementById(id)}
      function setStatus(msg){var s=$("status");if(s)s.textContent=msg}
      function readSession(){
        for(var i=0;i<SESSION_KEYS.length;i++){
          try{var raw=localStorage.getItem(SESSION_KEYS[i])||sessionStorage.getItem(SESSION_KEYS[i]);if(raw){var s=JSON.parse(raw);if(s&&!s.stop_moteur)return s}}catch(_){}
        }
        return null;
      }
      function displaySession(){
        var info=$("sessionInfo"), session=readSession();
        if(!session){if(info)info.textContent="Aucune session LOC active sur cet appareil.";setStatus("Pas de session — passe par le PIN pour t'identifier.");return}
        var lines=["module    : "+(session.module||"LOC"),"rôle      : "+(session.role||"owner"),"accès     : "+(session.access_ok?"✅ validé":"⚠️ à vérifier"),"expire    : "+(session.expires_at?new Date(session.expires_at).toLocaleString("fr-FR"):"—")];
        if(info)info.textContent=lines.join("\n");
        setStatus("Session LOC active sur cet appareil.");
      }
      function clearSession(){
        SESSION_KEYS.forEach(function(k){try{localStorage.removeItem(k)}catch(_){}try{sessionStorage.removeItem(k)}catch(_){}});
        try{sessionStorage.removeItem("digiy_loc_phone")}catch(_){}
        try{delete window.DIGIY_LOC_SESSION}catch(_){}
      }
      function clearDrafts(){DRAFT_KEYS.forEach(function(k){try{localStorage.removeItem(k)}catch(_){}})}
      $("btnRefresh").addEventListener("click",function(){displaySession();setStatus("État actualisé.")});
      $("btnClearSession").addEventListener("click",function(){clearSession();displaySession();setStatus("✅ Session LOC nettoyée. Passe par le PIN pour te réidentifier.")});
      $("btnClearAll").addEventListener("click",function(){clearSession();clearDrafts();displaySession();setStatus("✅ Session + brouillons nettoyés sur cet appareil.")});
      try{var g=window.DIGIY_GUARD;if(g&&g.ready&&typeof g.ready.then==="function"){g.ready.then(function(){displaySession()}).catch(function(){displaySession()})}else{displaySession()}}catch(_){displaySession()}
    })();
  </script>
