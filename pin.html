<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Accès • DIGIY</title>
  <meta name="theme-color" content="#020617"/>

  <!-- ╔══════════════════════════════════════════════╗
       ║  CONFIG — à adapter par module               ║
       ║  Copier ce bloc dans chaque pin.html         ║
       ╚══════════════════════════════════════════════╝ -->
  <script>
    window.DIGIY_SUPABASE_URL      = "https://wesqmwjjtsefyjnluosj.supabase.co";
    window.DIGIY_SUPABASE_ANON_KEY = "sb_publishable_tGHItRgeWDmGjnd0CK1DVQ_BIep4Ug3";
    window.DIGIY_SUPABASE_ANON     = window.DIGIY_SUPABASE_ANON_KEY;
    window.DIGIY_MODULE            = "LOC";          // LOC | DRIVER | CAISSE | MARKET | BUILD | JOBS | PAY | RESA | EXPLORE
    window.DIGIY_MODULE_LABEL      = "Je loue";      // Nom affiché
    window.DIGIY_MODULE_ICON       = "🏠";           // Emoji du module
    window.DIGIY_INDEX_URL         = "./index.html"; // Page cible après login
    window.DIGIY_SLUG_PREFIX       = "loc";          // Préfixe slug : loc | driver | pos | market | build | jobs | pay | resa | explore
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg:    #020617;
      --bg2:   #0b1020;
      --card:  rgba(255,255,255,.035);
      --line:  rgba(148,163,184,.20);
      --ink:   #f9fafb;
      --muted: #94a3b8;
      --gold:  #facc15;
      --green: #22c55e;
      --red:   #ef4444;
      --r:     22px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 16px;
      padding-top: calc(16px + env(safe-area-inset-top, 0px));
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 800px 500px at 15% -5%, rgba(250,204,21,.13), transparent 55%),
        radial-gradient(ellipse 700px 400px at 88% 5%,  rgba(34,197,94,.10),  transparent 55%),
        linear-gradient(180deg, var(--bg2), var(--bg));
    }

    /* ── Card ── */
    .card {
      width: min(420px, 100%);
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px 24px 24px;
      box-shadow: 0 28px 70px rgba(0,0,0,.55);
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .ico {
      font-size: 36px;
      line-height: 1;
      display: block;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid rgba(250,204,21,.30);
      background: rgba(250,204,21,.08);
      color: #fde68a;
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .title {
      font-size: 1.25rem;
      font-weight: 1100;
      line-height: 1.2;
    }

    .sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 800;
    }

    /* ── Separator ── */
    .sep {
      height: 1px;
      background: var(--line);
      margin: 20px 0;
    }

    /* ── Fields ── */
    .field {
      margin-bottom: 14px;
    }

    .label {
      display: block;
      font-size: .78rem;
      font-weight: 950;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.22);
      color: var(--ink);
      font-size: 1rem;
      font-weight: 900;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }

    .input::placeholder { color: rgba(148,163,184,.55); }

    .input:focus {
      border-color: rgba(250,204,21,.50);
      box-shadow: 0 0 0 3px rgba(250,204,21,.09);
    }

    /* ── PIN dots + clavier ── */
    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin: 6px 0 16px;
    }

    .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(148,163,184,.35);
      background: transparent;
      transition: background .12s, border-color .12s, transform .10s;
    }

    .dot.filled {
      background: var(--gold);
      border-color: var(--gold);
      transform: scale(1.1);
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-bottom: 14px;
    }

    .key {
      appearance: none;
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      color: var(--ink);
      font-size: 1.3rem;
      font-weight: 1000;
      font-family: inherit;
      min-height: 58px;
      cursor: pointer;
      transition: background .12s, transform .08s, border-color .12s;
      touch-action: manipulation;
      user-select: none;
    }

    .key:hover  { background: rgba(255,255,255,.08); border-color: rgba(250,204,21,.25); }
    .key:active { transform: scale(.94); background: rgba(250,204,21,.12); }

    .key.zero   { grid-column: 2; }
    .key.del    { font-size: 1rem; color: var(--muted); }
    .key.del:hover { color: var(--red); border-color: rgba(239,68,68,.30); }

    /* ── Submit ── */
    .btn {
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, rgba(250,204,21,.22), rgba(34,197,94,.18));
      border: 1px solid rgba(250,204,21,.35);
      color: #fff;
      font-size: 1rem;
      font-weight: 1100;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .15s, transform .10s, background .15s;
      touch-action: manipulation;
    }

    .btn:hover:not(:disabled)  { background: linear-gradient(135deg, rgba(250,204,21,.32), rgba(34,197,94,.26)); }
    .btn:active:not(:disabled) { transform: scale(.98); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Status ── */
    .status {
      margin-top: 14px;
      min-height: 36px;
      padding: 9px 13px;
      border-radius: 12px;
      font-size: .84rem;
      font-weight: 900;
      text-align: center;
      display: none;
      white-space: pre-wrap;
    }

    .status.err  { display: block; background: rgba(239,68,68,.10); border: 1px solid rgba(239,68,68,.30); color: #fca5a5; }
    .status.ok   { display: block; background: rgba(34,197,94,.10);  border: 1px solid rgba(34,197,94,.30);  color: #86efac; }
    .status.spin { display: block; background: rgba(148,163,184,.07); border: 1px solid var(--line); color: var(--muted); }

    /* ── Footer note ── */
    .note {
      margin-top: 18px;
      text-align: center;
      color: rgba(148,163,184,.65);
      font-size: .76rem;
      font-weight: 800;
      line-height: 1.5;
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="header">
      <span class="ico" id="moduleIcon">🏠</span>
      <div class="badge">🔑 Accès DIGIY</div>
      <div class="title" id="moduleLabel">Je loue</div>
      <div class="sub">Entre ton numéro et ton code secret</div>
    </div>

    <div class="sep"></div>

    <!-- Téléphone -->
    <div class="field">
      <label class="label" for="phoneInput">📱 Ton numéro</label>
      <input
        id="phoneInput"
        class="input"
        type="tel"
        inputmode="numeric"
        placeholder="221 77 XXX XX XX"
        autocomplete="tel"
        maxlength="15"
      />
    </div>

    <!-- PIN -->
    <div class="field">
      <label class="label">🔢 Ton code secret (4 chiffres)</label>
      <div class="pin-dots">
        <div class="dot" id="d0"></div>
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
      </div>
      <div class="keypad" id="keypad">
        <button class="key" data-v="1" type="button">1</button>
        <button class="key" data-v="2" type="button">2</button>
        <button class="key" data-v="3" type="button">3</button>
        <button class="key" data-v="4" type="button">4</button>
        <button class="key" data-v="5" type="button">5</button>
        <button class="key" data-v="6" type="button">6</button>
        <button class="key" data-v="7" type="button">7</button>
        <button class="key" data-v="8" type="button">8</button>
        <button class="key" data-v="9" type="button">9</button>
        <button class="key zero" data-v="0" type="button">0</button>
        <button class="key del"  data-v="⌫" type="button">⌫</button>
      </div>
    </div>

    <button class="btn" id="btnEnter" type="button" disabled>
      Entrer →
    </button>

    <div class="status" id="status"></div>

    <div class="note">
      Ton numéro et ton code ne sont jamais partagés.<br>
      DIGIY · 0% commission · 100% indépendance
    </div>

  </div>

  <script>
  (function () {
    "use strict";

    /* ── Config ── */
    const MODULE       = (window.DIGIY_MODULE       || "LOC").toUpperCase();
    const MODULE_LABEL = window.DIGIY_MODULE_LABEL  || MODULE;
    const MODULE_ICON  = window.DIGIY_MODULE_ICON   || "∞";
    const INDEX_URL    = window.DIGIY_INDEX_URL      || "./index.html";
    const SLUG_PREFIX  = (window.DIGIY_SLUG_PREFIX  || MODULE.toLowerCase()).replace(/_/g, "-");

    const MAX_AGE_MS   = 8 * 60 * 60 * 1000; // 8h

    /* Clés session — dérivées du module, compatibles guard.js */
    const mod = MODULE.toLowerCase();
    const SESSION_KEYS = [
      `digiy_${mod}_session`,
      `digiy_${mod}_guard_session`,
      `digiy_guard_${mod}_session`
    ];

    /* Clés phone/slug compatibles guard.js + hub.js */
    const PHONE_KEYS = [
      `digiy_${mod}_phone`,
      `digiy_${mod}_last_phone`,
      "DIGIY_LOC_HUB_PHONE",
      "digiy_phone"
    ];

    const SLUG_KEYS = [
      `digiy_${mod}_last_slug`,
      `digiy_${mod}_slug`,
      "digiy_last_slug",
      `digiy_${mod.replace(/-/g,"_")}_slug`
    ];

    /* ── DOM ── */
    const $ = id => document.getElementById(id);
    $("moduleLabel").textContent = MODULE_LABEL;
    $("moduleIcon").textContent  = MODULE_ICON;
    document.title = `Accès ${MODULE_LABEL} • DIGIY`;

    const phoneEl  = $("phoneInput");
    const btnEnter = $("btnEnter");
    const statusEl = $("status");

    let pin = "";

    /* ── Helpers ── */
    function normPhone(p) {
      const s = String(p || "").replace(/[^\d]/g, "");
      return s; // digits only — format DB : 221XXXXXXXXX
    }

    function buildSlug(phoneDigits) {
      if (!phoneDigits || !SLUG_PREFIX) return "";
      return `${SLUG_PREFIX}-${phoneDigits}`;
    }

    function getUrlParam(name) {
      try { return new URL(location.href).searchParams.get(name) || ""; }
      catch (_) { return ""; }
    }

    function ls(key, val) {
      try {
        if (val === undefined) return localStorage.getItem(key) || "";
        localStorage.setItem(key, val);
      } catch (_) {}
    }

    function ss(key, val) {
      try {
        if (val === undefined) return sessionStorage.getItem(key) || "";
        sessionStorage.setItem(key, val);
      } catch (_) {}
    }

    function show(msg, cls) {
      statusEl.className = "status " + cls;
      statusEl.textContent = msg;
    }

    function showSpin(msg) { show(msg, "spin"); }
    function showErr(msg)  { show(msg, "err"); }
    function showOk(msg)   { show(msg, "ok"); }
    function clearStatus() { statusEl.className = "status"; }

    /* ── Pré-remplissage phone ── */
    (function prefillPhone() {
      const fromUrl = normPhone(getUrlParam("phone"));
      if (fromUrl) { phoneEl.value = fromUrl; return; }

      // Chercher dans localStorage
      for (const key of [...PHONE_KEYS, "DIGIY_HUB_PHONE"]) {
        const v = normPhone(ls(key));
        if (v) { phoneEl.value = v; return; }
      }
    })();

    /* ── PIN keypad ── */
    function updateDots() {
      for (let i = 0; i < 4; i++) {
        $("d" + i).classList.toggle("filled", i < pin.length);
      }
    }

    function updateBtn() {
      const phone = normPhone(phoneEl.value);
      btnEnter.disabled = !(phone.length >= 9 && pin.length === 4);
    }

    $("keypad").addEventListener("click", e => {
      const key = e.target.closest("[data-v]");
      if (!key) return;
      const v = key.dataset.v;
      if (v === "⌫") {
        pin = pin.slice(0, -1);
      } else if (pin.length < 4) {
        pin += v;
      }
      updateDots();
      updateBtn();
      clearStatus();
    });

    phoneEl.addEventListener("input", () => {
      updateBtn();
      clearStatus();
    });

    /* Clavier physique pour le PIN */
    document.addEventListener("keydown", e => {
      if (document.activeElement === phoneEl) return;
      if (/^[0-9]$/.test(e.key) && pin.length < 4) {
        pin += e.key;
        updateDots();
        updateBtn();
      } else if (e.key === "Backspace") {
        pin = pin.slice(0, -1);
        updateDots();
        updateBtn();
      } else if (e.key === "Enter") {
        if (!btnEnter.disabled) doLogin();
      }
    });

    /* ── Supabase ── */
    function getSb() {
      if (window._digiy_sb) return window._digiy_sb;
      const url = window.DIGIY_SUPABASE_URL || "";
      const key = window.DIGIY_SUPABASE_ANON_KEY || window.DIGIY_SUPABASE_ANON || "";
      if (!url || !key) throw new Error("Supabase non configuré");
      if (!window.supabase?.createClient) throw new Error("Librairie Supabase absente");
      window._digiy_sb = window.supabase.createClient(url, key, {
        auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
      });
      return window._digiy_sb;
    }

    /* ── Écriture session ── */
    function writeSession(phone, slug, token) {
      const now  = Date.now();
      const sess = JSON.stringify({
        slug,
        phone,
        module: MODULE,
        validated_at: now,
        expires_at:   now + MAX_AGE_MS,
        session_token: token || "",
        access:    true,
        access_ok: true
      });

      SESSION_KEYS.forEach(k => {
        ls(k, sess);
        ss(k, sess);
      });

      /* Phone pour guard.js ALT_PHONE_KEYS + hub.js */
      PHONE_KEYS.forEach(k => {
        ss(k, phone);
        ls(k, phone); // hub.js lit depuis localStorage
      });

      /* Slug pour guard.js ALT_SLUG_KEYS */
      if (slug) {
        SLUG_KEYS.forEach(k => ls(k, slug));

        /* Module slug map pour hub.js */
        try {
          const map = JSON.parse(ls("digiy_module_slugs") || "{}") || {};
          map[MODULE] = slug;
          ls("digiy_module_slugs", JSON.stringify(map));
        } catch (_) {}
      }

      /* Slug global digiy_slug pour hub.js getGenericSlug */
      if (slug) ls("digiy_slug", slug);
    }

    /* ── Redirection ── */
    function redirect(slug) {
      try {
        const u = new URL(INDEX_URL, location.href);
        if (slug) u.searchParams.set("slug", slug);
        u.searchParams.delete("phone");
        location.replace(u.toString());
      } catch (_) {
        location.replace(INDEX_URL);
      }
    }

    /* ── Login ── */
    async function doLogin() {
      const rawPhone = normPhone(phoneEl.value);
      const rawPin   = pin;

      if (rawPhone.length < 9) { showErr("Numéro incomplet."); return; }
      if (rawPin.length !== 4) { showErr("Code à 4 chiffres requis."); return; }

      btnEnter.disabled = true;
      showSpin("⏳ Vérification en cours…");

      try {
        const sb = getSb();

        const { data, error } = await sb.rpc("digiy_verify_pin", {
          p_phone:  rawPhone,
          p_module: MODULE,
          p_pin:    rawPin
        });

        if (error) throw new Error(error.message || "Erreur serveur");

        const ok =
          data === true ||
          data?.ok === true ||
          data?.access === true ||
          data?.status === "ok";

        if (!ok) {
          pin = "";
          updateDots();
          updateBtn();
          showErr("❌ Numéro ou code incorrect.\nVérifie et réessaie.");
          return;
        }

        /* Slug retourné par le RPC ou construit depuis le phone */
        const rpcSlug  = data?.slug || data?.identifiant || "";
        const finalSlug = rpcSlug || buildSlug(rawPhone);

        writeSession(rawPhone, finalSlug, data?.session_token || "");

        showOk("✅ Accès ouvert. Redirection…");

        setTimeout(() => redirect(finalSlug), 700);

      } catch (err) {
        pin = "";
        updateDots();
        updateBtn();
        btnEnter.disabled = false;
        showErr("❌ " + (err?.message || "Erreur inattendue."));
      }
    }

    btnEnter.addEventListener("click", doLogin);

  })();
  </script>
</body>
</html>
