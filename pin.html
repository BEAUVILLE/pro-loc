<script>
window.DIGIY_SUPABASE_URL="https://wesqmwjjtsefyjnluosj.supabase.co";
window.DIGIY_SUPABASE_ANON_KEY="sb_publishable_tGHItRgeWDmGjnd0CK1DVQ_BIep4Ug3";
window.DIGIY_SUPABASE_ANON=window.DIGIY_SUPABASE_ANON_KEY;
window.DIGIY_MODULE="LOC";
window.DIGIY_MODULE_LABEL="PRO LOC";
window.DIGIY_MODULE_ICON="🏠";
window.DIGIY_INDEX_URL="./accueil.html";
window.DIGIY_SLUG_PREFIX="loc";
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#1e293b;--bg2:#334155;--line:rgba(148,163,184,.20);--ink:#f9fafb;--muted:#94a3b8;--gold:#facc15;--green:#22c55e;--red:#ef4444}*{box-sizing:border-box;margin:0;padding:0}body{min-height:100dvh;display:grid;place-items:center;padding:16px;padding-top:calc(16px + env(safe-area-inset-top,0px));padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:radial-gradient(ellipse 800px 500px at 15% -5%,rgba(250,204,21,.13),transparent 55%),radial-gradient(ellipse 700px 400px at 88% 5%,rgba(34,197,94,.10),transparent 55%),linear-gradient(180deg,var(--bg2),var(--bg))}.card{width:min(420px,100%);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:28px;padding:28px 24px 24px;box-shadow:0 28px 70px rgba(0,0,0,.55)}.header{text-align:center;margin-bottom:22px}.ico{font-size:38px;line-height:1;display:block;margin-bottom:10px}.badge{display:inline-flex;padding:5px 12px;border-radius:999px;border:1px solid rgba(250,204,21,.30);background:rgba(250,204,21,.08);color:#fde68a;font-size:11px;font-weight:950;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}.title{font-size:1.3rem;font-weight:1000}.steps{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 0 22px}.step{display:flex;flex-direction:column;align-items:center;gap:4px}.step-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-size:13px;font-weight:1000;color:var(--muted)}.step-dot.active{border-color:var(--gold);background:rgba(250,204,21,.12);color:var(--gold)}.step-dot.done{border-color:var(--green);background:rgba(34,197,94,.15);color:var(--green)}.step-lbl{font-size:10px;font-weight:900;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}.step-lbl.active{color:var(--gold)}.step-connector{width:32px;height:2px;background:var(--line);border-radius:2px;margin-bottom:14px}.step-connector.done{background:var(--green)}.panel{display:none}.panel.active{display:block}.label{display:block;font-size:.78rem;font-weight:950;color:var(--muted);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}.phone-wrap{position:relative}.phone-flag{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px}.input{width:100%;padding:14px 15px 14px 42px;border-radius:14px;border:1px solid var(--line);background:rgba(0,0,0,.22);color:var(--ink);font-size:1.05rem;font-weight:900;outline:none}.input:focus{border-color:rgba(250,204,21,.50);box-shadow:0 0 0 3px rgba(250,204,21,.09)}.input.err-field{border-color:rgba(239,68,68,.50)!important}.phone-recap{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-radius:12px;border:1px solid rgba(34,197,94,.25);background:rgba(34,197,94,.06);margin-bottom:18px}.phone-recap-num{font-size:.9rem;font-weight:950;color:#86efac}.phone-recap-btn{font-size:.75rem;font-weight:950;color:var(--muted);cursor:pointer;background:none;border:none;text-decoration:underline}.pin-dots{display:flex;justify-content:center;gap:16px;margin:8px 0 20px}.dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(148,163,184,.30)}.dot.filled{background:var(--gold);border-color:var(--gold);transform:scale(1.12)}.dot.err{border-color:var(--red)!important;background:rgba(239,68,68,.2)!important}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}.key{border:1px solid rgba(148,163,184,.18);border-radius:14px;background:rgba(255,255,255,.04);color:var(--ink);font-size:1.3rem;font-weight:1000;min-height:58px;cursor:pointer}.key:active{transform:scale(.94);background:rgba(250,204,21,.12)}.key.zero{grid-column:2}.key.del{font-size:1rem;color:var(--muted)}.btn{width:100%;min-height:52px;border-radius:16px;border:1px solid rgba(250,204,21,.35);background:linear-gradient(135deg,rgba(250,204,21,.22),rgba(34,197,94,.18));color:#fff;font-size:1rem;font-weight:1000;cursor:pointer}.btn:disabled{opacity:.40;cursor:not-allowed}.status{margin-top:12px;padding:0;border-radius:12px;font-size:.84rem;font-weight:900;line-height:1.5;display:none;white-space:pre-wrap}.status.show{display:block;padding:10px 13px}.status.err{background:rgba(239,68,68,.10);border:1px solid rgba(239,68,68,.30);color:#fca5a5}.status.ok{background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.30);color:#86efac}.status.spin{background:rgba(148,163,184,.07);border:1px solid var(--line);color:var(--muted)}.note{margin-top:18px;text-align:center;color:rgba(148,163,184,.58);font-size:.74rem;font-weight:800;line-height:1.55}@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}.shake{animation:shake .35s ease}
</style>
</head>
<body>
<div class="card">
  <div class="header"><span class="ico" id="moduleIcon">🏠</span><div class="badge">🔑 Accès DIGIY</div><div class="title" id="moduleLabel">PRO LOC</div></div>
  <div class="steps"><div class="step"><div class="step-dot active" id="dot1">1</div><div class="step-lbl active" id="lbl1">Numéro</div></div><div class="step-connector" id="conn"></div><div class="step"><div class="step-dot" id="dot2">2</div><div class="step-lbl" id="lbl2">Code</div></div></div>
  <div class="panel active" id="step1"><label class="label" for="phoneInput">📱 Ton numéro de téléphone</label><div class="phone-wrap"><span class="phone-flag">🇸🇳</span><input id="phoneInput" class="input" type="tel" inputmode="numeric" placeholder="221 77 XXX XX XX" autocomplete="tel" maxlength="15"></div><div class="status" id="status1"></div><button class="btn" id="btnContinue" type="button" style="margin-top:16px" disabled>Continuer →</button></div>
  <div class="panel" id="step2"><div class="phone-recap"><span class="phone-recap-num" id="phoneDisplay"></span><button class="phone-recap-btn" id="btnBack" type="button">Modifier</button></div><label class="label">🔢 Ton code secret (4 chiffres)</label><div class="pin-dots" id="pinDots"><div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div></div><div class="keypad" id="keypad"><button class="key" data-v="1">1</button><button class="key" data-v="2">2</button><button class="key" data-v="3">3</button><button class="key" data-v="4">4</button><button class="key" data-v="5">5</button><button class="key" data-v="6">6</button><button class="key" data-v="7">7</button><button class="key" data-v="8">8</button><button class="key" data-v="9">9</button><button class="key zero" data-v="0">0</button><button class="key del" data-v="DEL">⌫</button></div><button class="btn" id="btnEnter" type="button" disabled>Ouvrir PRO LOC →</button><div class="status" id="status2"></div></div>
  <div class="note">Ton numéro et ton code ne sont jamais partagés.<br>DIGIY · 0% commission · 100% indépendance ∞</div>
</div>
<script>
(()=>{
"use strict";
const MODULE="LOC",MODULE_LABEL="PRO LOC",MODULE_ICON="🏠",INDEX_URL="./accueil.html",SLUG_PREFIX="loc",MAX_AGE=8*60*60*1000;
const SKEYS=["digiy_loc_session","digiy_loc_guard_session","digiy_guard_loc_session","DIGIY_LOC_PIN_SESSION","DIGIY_LOC_SESSION","DIGIY_PIN_SESSION","DIGIY_ACCESS","DIGIY_SESSION_LOC","digiy_session_loc"];
const PKEYS=["digiy_loc_phone","digiy_loc_last_phone","DIGIY_LOC_HUB_PHONE","digiy_phone"];
const SLKEYS=["digiy_loc_last_slug","digiy_loc_slug","digiy_last_slug"];
const $=id=>document.getElementById(id);let pin="",confirmedPhone="",busy=false;
const norm=p=>String(p||"").replace(/\D/g,"");
const fmt=d=>d.length===12&&d.startsWith("221")?`${d.slice(0,3)} ${d.slice(3,5)} ${d.slice(5,8)} ${d.slice(8,10)} ${d.slice(10)}`:d;
const slug=p=>SLUG_PREFIX&&p?`${SLUG_PREFIX}-${p}`:"";
const ls=(k,v)=>{try{if(v===undefined)return localStorage.getItem(k)||"";localStorage.setItem(k,v)}catch(_){return ""}};
const ss=(k,v)=>{try{if(v===undefined)return sessionStorage.getItem(k)||"";sessionStorage.setItem(k,v)}catch(_){return ""}};
const showSt=(id,msg,cls)=>{const e=$(id);e.className="status show "+cls;e.textContent=msg};
const clearSt=id=>{const e=$(id);e.className="status";e.textContent=""};
const shake=el=>{el.classList.remove("shake");void el.offsetWidth;el.classList.add("shake");setTimeout(()=>el.classList.remove("shake"),400)};
function getSb(){if(window._dsb)return window._dsb;if(!window.supabase?.createClient)throw new Error("Librairie Supabase absente");window._dsb=window.supabase.createClient(window.DIGIY_SUPABASE_URL,window.DIGIY_SUPABASE_ANON_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}});return window._dsb}
function writeSession(phone,sl,token){const now=Date.now();const sess=JSON.stringify({slug:sl,phone,module:MODULE,module_label:MODULE_LABEL,validated_at:now,validated_iso:new Date(now).toISOString(),expires_at:now+MAX_AGE,session_token:token||"",ok:true,verified:true,access:true,access_ok:true,source:"pin.html"});SKEYS.forEach(k=>{ls(k,sess);ss(k,sess)});PKEYS.forEach(k=>{ls(k,phone);ss(k,phone)});if(sl){SLKEYS.forEach(k=>ls(k,sl));try{const m=JSON.parse(ls("digiy_module_slugs")||"{}")||{};m[MODULE]=sl;ls("digiy_module_slugs",JSON.stringify(m))}catch(_){}ls("digiy_slug",sl)}}
function redirect(sl){try{const u=new URL(INDEX_URL,location.href);if(sl)u.searchParams.set("slug",sl);u.searchParams.delete("phone");location.replace(u.toString())}catch(_){location.replace(INDEX_URL)}}
const phoneEl=$("phoneInput"),btnContinue=$("btnContinue");
const updateContinue=()=>btnContinue.disabled=norm(phoneEl.value).length<9;
phoneEl.addEventListener("input",()=>{clearSt("status1");phoneEl.classList.remove("err-field");updateContinue()});
phoneEl.addEventListener("keydown",e=>{if(e.key==="Enter"&&!btnContinue.disabled)goStep2()});updateContinue();
function goStep2(){const raw=norm(phoneEl.value);if(raw.length<9){phoneEl.classList.add("err-field");showSt("status1","❌ Numéro trop court.\nFormat attendu : 221 77 XXX XX XX","err");shake(phoneEl);return}confirmedPhone=raw;$("step1").classList.remove("active");$("step2").classList.add("active");$("dot1").className="step-dot done";$("dot1").textContent="✓";$("lbl1").className="step-lbl";$("dot2").className="step-dot active";$("lbl2").className="step-lbl active";$("conn").classList.add("done");$("phoneDisplay").textContent=fmt(raw);pin="";updateDots()}
btnContinue.addEventListener("click",goStep2);
$("btnBack").addEventListener("click",()=>{busy=false;$("step2").classList.remove("active");$("step1").classList.add("active");$("dot1").className="step-dot active";$("dot1").textContent="1";$("lbl1").className="step-lbl active";$("dot2").className="step-dot";$("lbl2").className="step-lbl";$("conn").classList.remove("done");pin="";clearSt("status2");updateDots()});
function updateDots(){for(let i=0;i<4;i++){const d=$("d"+i);d.classList.toggle("filled",i<pin.length);d.classList.remove("err")}$("btnEnter").disabled=pin.length!==4||busy}
$("keypad").addEventListener("click",e=>{const key=e.target.closest("[data-v]");if(!key||busy)return;const v=key.dataset.v;if(v==="DEL")pin=pin.slice(0,-1);else if(pin.length<4)pin+=v;updateDots();clearSt("status2");if(pin.length===4)setTimeout(doLogin,120)});
$("btnEnter").addEventListener("click",doLogin);
async function doLogin(){if(pin.length!==4||busy)return;busy=true;updateDots();showSt("status2","⏳ Vérification du code…","spin");try{const sb=getSb();const{data,error}=await sb.rpc("digiy_verify_pin",{p_phone:confirmedPhone,p_module:MODULE,p_pin:pin});if(error)throw new Error(error.message||"Erreur serveur");const row=Array.isArray(data)?data[0]:data;const ok=row===true||row?.ok===true||row?.access===true||row?.status==="ok";if(!ok){busy=false;pin="";updateDots();for(let i=0;i<4;i++)$("d"+i).classList.add("err");shake($("pinDots"));showSt("status2","❌ Code incorrect.\nVérifie tes 4 chiffres et réessaie.","err");return}const finalSlug=row?.slug||row?.identifiant||slug(confirmedPhone);writeSession(confirmedPhone,finalSlug,row?.session_token||"");showSt("status2","✅ PRO LOC ouvert. Redirection…","ok");setTimeout(()=>redirect(finalSlug),700)}catch(err){busy=false;pin="";updateDots();showSt("status2","❌ Erreur : "+(err?.message||"inattendue."),"err")}}
})();
</script>
</body>
</html>
