kground:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.30);color:#86efac}.status.wait{background:rgba(148,163,184,.08);border:1px solid var(--line);color:var(--muted)}.note{margin-top:18px;text-align:center;color:rgba(168,180,197,.72);font-size:.75rem;font-weight:800;line-height:1.5}

<body>
<main class="card">
  <div class="head"><div class="ico">🏠</div><div class="badge">🔑 ACCÈS DIGIY</div><div class="title">PRO LOC</div></div>
  <form id="loginForm" novalidate>
    <label for="phone">Ton numéro de téléphone</label>
    <input class="input" id="phone" type="tel" inputmode="numeric" autocomplete="tel" placeholder="221 77 XXX XX XX" maxlength="15" required>
    <label for="pin">Ton code secret</label>
    <input class="input pin" id="pin" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="••••" maxlength="4" pattern="[0-9]{4}" required>
    <button class="btn" id="submitBtn" type="submit">Ouvrir PRO LOC →</button>
    <div class="status" id="status" role="status" aria-live="polite"></div>
  </form>
  <div class="note">Session privée 8 h · aucune identité dans l’adresse.<br>DIGIY · paiement direct · 0 % commission.</div>
</main>
<script>
(()=>{
"use strict";
const MODULE="LOC",TTL=8*60*60*1000;
const SESSION_KEYS=["DIGIY_LOC_PRO_SESSION_V1","DIGIY_LOC_SESSION","DIGIY_LOC_PIN_SESSION","DIGIY_SESSION_LOC","digiy_loc_session","digiy_loc_guard_session","digiy_guard_loc_session","digiy_session_loc"];
const $=id=>document.getElementById(id);
const normalizePhone=value=>{const digits=String(value||"").replace(/\D/g,"");return digits.length===9?"221"+digits:digits.slice(0,15)};
const normalizeSlug=value=>String(value||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"-").replace(/[^a-z0-9-_]/g,"").replace(/-+/g,"-").replace(/^[-_]+|[-_]+$/g,"");
const setStatus=(text,kind)=>{const box=$("status");box.textContent=text;box.className="status show "+kind};
function clearOldSessions(){[...SESSION_KEYS,"DIGIY_ACCESS","DIGIY_PIN_SESSION","digiy_guard_session","DIGIY_SESSION","digiy_session"].forEach(key=>{try{sessionStorage.removeItem(key);localStorage.removeItem(key)}catch(_){}})}
function saveSession(phone,slug){const now=Date.now();const session={module:MODULE,public_name:"PRO LOC",phone,slug:normalizeSlug(slug),role:"owner",access:true,access_ok:true,pin_session_ok:true,verified:true,validated_at:now,expires_at:now+TTL,source:"pin.html"};const raw=JSON.stringify(session);clearOldSessions();SESSION_KEYS.forEach(key=>{try{sessionStorage.setItem(key,raw);localStorage.setItem(key,raw)}catch(_){}});try{sessionStorage.setItem("digiy_loc_phone",phone);if(session.slug){sessionStorage.setItem("digiy_loc_slug",session.slug);localStorage.setItem("digiy_loc_slug",session.slug);localStorage.setItem("digiy_loc_last_slug",session.slug)}}catch(_){}return session}
function getSb(){if(!window.supabase?.createClient)throw new Error("Service de vérification indisponible");return window.supabase.createClient(window.DIGIY_SUPABASE_URL,window.DIGIY_SUPABASE_ANON_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}})}
$("loginForm").addEventListener("submit",async event=>{event.preventDefault();const phone=normalizePhone($("phone").value),pin=String($("pin").value||"").replace(/\D/g,"");if(phone.length<9||pin.length!==4){setStatus("Vérifie le numéro et les 4 chiffres du code.","err");return}$("submitBtn").disabled=true;setStatus("Vérification sécurisée du code…","wait");try{const {data,error}=await getSb().rpc("digiy_verify_pin",{p_phone:phone,p_module:MODULE,p_pin:pin});if(error)throw error;const row=Array.isArray(data)?data[0]:data;const ok=row===true||row?.ok===true||row?.access===true||row?.access_ok===true||row?.status==="ok";if(!ok){$("pin").value="";$("submitBtn").disabled=false;setStatus("Code incorrect ou accès PRO LOC indisponible.","err");return}const internalSlug=row?.slug||row?.identifiant||("loc-"+phone);saveSession(phone,internalSlug);setStatus("PRO LOC ouvert. Redirection…","ok");location.replace("./accueil.html")}catch(_){$("submitBtn").disabled=false;setStatus("Vérification impossible. Réessaie.","err")}});
})();
</script>
