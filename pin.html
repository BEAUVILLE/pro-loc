<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#061b14"/>
  <title>DIGIY LOC PRO — PIN</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#061b14; --card:#0b2a1f; --line:rgba(255,255,255,.14);
      --text:#eafff1; --muted:rgba(234,255,241,.72);
      --gold:#facc15; --ok:#22c55e; --bad:#fb7185;
      --shadow:0 18px 55px rgba(0,0,0,.45); --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto;
      background:radial-gradient(circle at top, rgba(250,204,21,.10), transparent 55%),
                 linear-gradient(135deg,#04160f,#0a2b1f);
      color:var(--text); padding:18px;
    }
    .card{
      width:min(520px,92vw);
      background:linear-gradient(145deg,rgba(11,42,31,.96),rgba(6,35,25,.96));
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:18px;
    }
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .brand{display:flex;align-items:center;gap:10px}
    .ico{
      width:46px;height:46px;border-radius:50%;
      display:grid;place-items:center;
      background:radial-gradient(circle at 30% 0,var(--gold),transparent 60%);
      color:#062015;font-weight:1000;
      border:1px solid rgba(250,204,21,.35);
    }
    .t{font-weight:1000;letter-spacing:.12em;font-size:12px}
    .sub{font-size:12px;color:var(--muted);margin-top:4px}
    .pill{
      border:1px solid var(--line);
      background:rgba(250,204,21,.10);
      padding:7px 10px;border-radius:999px;
      font-size:12px;font-weight:900;
    }
    .sep{height:1px;background:var(--line);margin:14px 0}
    label{display:block;font-size:12px;color:var(--muted);margin:8px 0 6px}
    input{
      width:100%; padding:14px 14px;
      border-radius:14px; border:1px solid var(--line);
      background:rgba(0,0,0,.22); color:var(--text);
      font-size:16px; font-weight:900; letter-spacing:.14em;
      outline:none;
    }
    button{
      width:100%; margin-top:12px; padding:14px 14px;
      border-radius:14px; border:none;
      background:linear-gradient(90deg,var(--ok),var(--gold));
      color:#062015; font-weight:1000; font-size:15px;
      cursor:pointer;
    }
    button:disabled{opacity:.6; cursor:not-allowed}
    .msg{margin-top:12px;font-size:12px;color:var(--muted);line-height:1.5}
    .ok{color:var(--ok); font-weight:900}
    .bad{color:var(--bad); font-weight:900}
    .mini{margin-top:10px; font-size:12px; color:var(--muted)}
    .mini b{color:var(--text)}
  </style>
</head>

<body>
  <div class="card">
    <div class="top">
      <div class="brand">
        <div class="ico">∞</div>
        <div>
          <div class="t" id="title">LOC PRO — PIN</div>
          <div class="sub" id="subtitle">Chargement…</div>
        </div>
      </div>
      <div class="pill" id="modPill">loc_pro</div>
    </div>

    <div class="sep"></div>

    <div class="mini">
      SLUG : <b id="slugBox">—</b>
    </div>

    <label for="pin">Entre ton PIN propriétaire</label>
    <input id="pin" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="••••" maxlength="8"/>

    <button id="go">🚀 OUVRIR MON ESPACE</button>

    <div class="msg" id="msg"></div>
  </div>

<script>
(async () => {
  "use strict";

  const SUPABASE_URL = "https://wesqmwjjtsefyjnluosj.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indlc3Ftd2pqdHNlZnlqbmx1b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUxNzg4ODIsImV4cCI6MjA4MDc1NDg4Mn0.dZfYOc2iL2_wRYL3zExZFsFSBK6AbMeOid2LrIjcTdA";

  const MODULE = "LOC";
  const NEXT_URL = "app.html";
  const SESSION_KEY = "DIGIY_LOC_PRO_SESSION";
  const SESSION_TTL_MS = 8 * 60 * 60 * 1000; // 8h

  const STORAGE_SLUG_KEY = "digiy_loc_slug";
  const STORAGE_LAST_SLUG = "digiy_last_slug";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const $ = (id) => document.getElementById(id);

  const url = new URL(location.href);
  const slug = String(url.searchParams.get("slug") || "").trim().toLowerCase();

  $("slugBox").textContent = slug || "—";
  $("subtitle").textContent = slug
    ? "Accès sécurisé — PIN requis"
    : "SLUG manquant";

  function msg(html) {
    $("msg").innerHTML = html;
  }

  function now() {
    return Date.now();
  }

  function lsSet(k, v) {
    try { localStorage.setItem(k, String(v ?? "")); } catch {}
  }

  function lsRemove(k) {
    try { localStorage.removeItem(k); } catch {}
  }

  function safeJsonParse(x) {
    try { return typeof x === "string" ? JSON.parse(x) : x; }
    catch { return null; }
  }

  function normalizeResult(raw) {
    const r = safeJsonParse(raw) || {};

    return {
      ok: !!r.ok,
      owner_id: r.owner_id || r.ownerId || r.pro_id || r.id || "",
      phone: r.phone || r.pro_phone || "",
      title: r.title || r.business_name || r.name || "",
      business_name: r.business_name || r.title || r.name || "",
      business_code: r.business_code || r.code || "TEST",
      slug: r.slug || slug || "",
      module: (r.module || MODULE || "").toUpperCase(),
      error: r.error || ""
    };
  }

  function saveSession(raw) {
    const data = normalizeResult(raw);

    const session = {
      ok: true,
      module: MODULE,
      owner_id: data.owner_id,
      slug: data.slug || slug,
      phone: data.phone || "",
      title: data.title || "",
      business_name: data.business_name || "",
      business_code: data.business_code || "TEST",
      created_at: now(),
      expires_at: now() + SESSION_TTL_MS
    };

    // session brute
    lsSet(SESSION_KEY, JSON.stringify(session));

    // slug memory pour le nouveau guard
    lsSet(STORAGE_SLUG_KEY, session.slug);
    lsSet(STORAGE_LAST_SLUG, session.slug);
    lsSet("DIGIY_SLUG", session.slug);

    // owner context attendu par le cockpit LOC
    lsSet("DIGIY_LOC_OWNER_ID", session.owner_id);
    lsSet("digiy_loc_owner_id", session.owner_id);
    lsSet("DIGIY_OWNER_ID", session.owner_id);
    lsSet("owner_id", session.owner_id);

    // business context
    lsSet("DIGIY_LOC_BUSINESS_CODE", session.business_code);
    lsSet("DIGIY_BUSINESS_CODE", session.business_code);

    if (session.business_name) {
      lsSet("DIGIY_LOC_BUSINESS_NAME", session.business_name);
      lsSet("DIGIY_BUSINESS_NAME", session.business_name);
      lsSet("DIGIY_TITLE", session.business_name);
    } else {
      lsRemove("DIGIY_LOC_BUSINESS_NAME");
    }

    // phone / compat
    if (session.phone) {
      lsSet("DIGIY_PHONE", session.phone);
      lsSet("DIGIY_LOC_PHONE", session.phone);
    }

    // compat ancien monde
    lsSet("DIGIY_PRO_ID", session.owner_id);

    return session;
  }

  if (!slug) {
    msg(`<span class="bad">❌ SLUG manquant.</span><br>Reviens depuis ton lien GO PIN (avec ?slug=...).`);
    $("go").disabled = true;
    return;
  }

  setTimeout(() => $("pin").focus(), 150);

  async function enter() {
    const pin = $("pin").value.trim();

    if (pin.length < 3) {
      msg(`<span class="bad">❌ PIN invalide.</span>`);
      return;
    }

    $("go").disabled = true;
    msg(`Vérification en cours…`);

    // 1) tentative RPC générique actuelle
    let rpcData = null;
    let rpcError = null;

    ({ data: rpcData, error: rpcError } = await sb.rpc("verify_access_pin", {
      p_slug: slug,
      p_pin: pin
    }));

    // 2) fallback LOC dédié si plus tard tu poses loc_pin_login
    if (rpcError || !normalizeResult(rpcData)?.ok) {
      const fallback = await sb.rpc("loc_pin_login", {
        p_slug: slug,
        p_pin: pin
      }).catch(() => ({ data: null, error: null }));

      if (fallback && fallback.data) {
        rpcData = fallback.data;
        rpcError = fallback.error || null;
      }
    }

    if (rpcError) {
      $("go").disabled = false;
      msg(`<span class="bad">❌ Erreur.</span><br>${String(rpcError.message || rpcError)}`);
      return;
    }

    const result = normalizeResult(rpcData);

    if (!result.ok || !result.owner_id) {
      $("go").disabled = false;
      msg(`<span class="bad">❌ Accès refusé.</span><br>${result.error || "PIN incorrect ou owner_id manquant"}`);
      return;
    }

    saveSession(result);

    msg(`<span class="ok">✅ Accès validé.</span> Ouverture de ton espace…`);

    setTimeout(() => {
      const next = new URL(NEXT_URL, location.href);
      next.searchParams.set("slug", slug);
      location.href = next.toString();
    }, 450);
  }

  $("go").addEventListener("click", enter);
  $("pin").addEventListener("keydown", (e) => {
    if (e.key === "Enter") enter();
  });
})();
</script>
</body>
</html>
