<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#061b14"/>
  <title>DIGIY LOC PRO — PIN</title>

  <script>
    window.DIGIY_SUPABASE_URL = "https://wesqmwjjtsefyjnluosj.supabase.co";
    window.DIGIY_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indlc3Ftd2pqdHNlZnlqbmx1b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUxNzg4ODIsImV4cCI6MjA4MDc1NDg4Mn0.dZfYOc2iL2_wRYL3zExZFsFSBK6AbMeOid2LrIjcTdA";
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#061b14;
      --card:#0b2a1f;
      --line:rgba(255,255,255,.14);
      --text:#eafff1;
      --muted:rgba(234,255,241,.72);
      --gold:#facc15;
      --ok:#22c55e;
      --bad:#fb7185;
      --shadow:0 18px 55px rgba(0,0,0,.45);
      --r:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:
        radial-gradient(circle at top, rgba(250,204,21,.10), transparent 55%),
        linear-gradient(135deg,#04160f,#0a2b1f);
      color:var(--text);
      padding:18px;
    }

    .card{
      width:min(520px,92vw);
      background:linear-gradient(145deg,rgba(11,42,31,.96),rgba(6,35,25,.96));
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .ico{
      width:46px;
      height:46px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:radial-gradient(circle at 30% 0,var(--gold),transparent 60%);
      color:#062015;
      font-weight:1000;
      border:1px solid rgba(250,204,21,.35);
    }

    .t{
      font-weight:1000;
      letter-spacing:.12em;
      font-size:12px;
    }

    .sub{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    .pill{
      border:1px solid var(--line);
      background:rgba(250,204,21,.10);
      padding:7px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
    }

    .sep{
      height:1px;
      background:var(--line);
      margin:14px 0;
    }

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin:8px 0 6px;
    }

    input{
      width:100%;
      padding:14px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.22);
      color:var(--text);
      font-size:16px;
      font-weight:900;
      letter-spacing:.14em;
      outline:none;
    }

    input:focus{
      border-color:rgba(250,204,21,.45);
      box-shadow:0 0 0 3px rgba(250,204,21,.10);
    }

    button{
      width:100%;
      margin-top:12px;
      padding:14px 14px;
      border-radius:14px;
      border:none;
      background:linear-gradient(90deg,var(--ok),var(--gold));
      color:#062015;
      font-weight:1000;
      font-size:15px;
      cursor:pointer;
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .msg{
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
      min-height:18px;
    }

    .ok{
      color:var(--ok);
      font-weight:900;
    }

    .bad{
      color:var(--bad);
      font-weight:900;
    }

    .mini{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
    }

    .mini b{
      color:var(--text);
      word-break:break-word;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="top">
      <div class="brand">
        <div class="ico">∞</div>
        <div>
          <div class="t" id="title">LOC PRO — PIN</div>
          <div class="sub" id="subtitle">Chargement…</div>
        </div>
      </div>
      <div class="pill" id="modPill">loc_pro</div>
    </div>

    <div class="sep"></div>

    <div class="mini">
      SLUG : <b id="slugBox">—</b>
    </div>

    <label for="pin">Entre ton PIN propriétaire</label>
    <input id="pin" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="••••" maxlength="8"/>

    <button id="go">🚀 OUVRIR MON ESPACE</button>

    <div class="msg" id="msg"></div>
  </div>

<script>
(async () => {
  "use strict";

  const MODULE = "LOC";
  const NEXT_URL = "./app.html";

  const SESSION_KEY = "DIGIY_LOC_PRO_SESSION";
  const GENERIC_SESSION_KEY = "DIGIY_PRO_SESSION";
  const SESSION_TTL_MS = 8 * 60 * 60 * 1000;

  const STORAGE_SLUG_KEY = "digiy_loc_slug";
  const STORAGE_LAST_SLUG = "digiy_last_slug";

  const SUPABASE_URL = String(window.DIGIY_SUPABASE_URL || "").trim();
  const SUPABASE_ANON_KEY = String(window.DIGIY_SUPABASE_ANON_KEY || "").trim();

  const $ = (id) => document.getElementById(id);

  function normalizeSlug(value) {
    return String(value || "")
      .trim()
      .toLowerCase()
      .replace(/\s+/g, "-")
      .replace(/[^\w-]/g, "")
      .replace(/-+/g, "-")
      .replace(/^-|-$/g, "");
  }

  function normalizePin(value) {
    return String(value || "").replace(/\s+/g, "");
  }

  function normalizePhone(value) {
    return String(value || "").replace(/[^\d]/g, "");
  }

  function now() {
    return Date.now();
  }

  function msg(html) {
    $("msg").innerHTML = html;
  }

  function storageSet(key, value) {
    try { localStorage.setItem(key, String(value ?? "")); } catch {}
    try { sessionStorage.setItem(key, String(value ?? "")); } catch {}
  }

  function storageRemove(key) {
    try { localStorage.removeItem(key); } catch {}
    try { sessionStorage.removeItem(key); } catch {}
  }

  function safeJsonParse(value) {
    try {
      return typeof value === "string" ? JSON.parse(value) : value;
    } catch {
      return null;
    }
  }

  function normalizeResult(raw, forced = {}) {
    const r = safeJsonParse(raw) || {};
    return {
      ok: !!r.ok,
      owner_id: String(r.owner_id || r.ownerId || r.pro_id || r.id || forced.owner_id || "").trim(),
      phone: normalizePhone(r.phone || r.pro_phone || forced.phone || ""),
      title: String(r.title || r.business_name || r.name || forced.title || "").trim(),
      business_name: String(r.business_name || r.title || r.name || forced.business_name || "").trim(),
      business_code: String(r.business_code || r.code || forced.business_code || "").trim(),
      slug: normalizeSlug(r.slug || forced.slug || ""),
      module: String(r.module || forced.module || MODULE).trim().toUpperCase(),
      error: String(r.error || r.reason || forced.error || "").trim()
    };
  }

  function clearOldSessionKeys() {
    [
      SESSION_KEY,
      GENERIC_SESSION_KEY,
      STORAGE_SLUG_KEY,
      STORAGE_LAST_SLUG,
      "DIGIY_SLUG",
      "digiy_slug",
      "DIGIY_LOC_OWNER_ID",
      "digiy_loc_owner_id",
      "DIGIY_OWNER_ID",
      "owner_id",
      "DIGIY_LOC_BUSINESS_CODE",
      "DIGIY_BUSINESS_CODE",
      "DIGIY_LOC_BUSINESS_NAME",
      "DIGIY_BUSINESS_NAME",
      "DIGIY_TITLE",
      "DIGIY_PHONE",
      "DIGIY_LOC_PHONE",
      "digiy_loc_phone",
      "DIGIY_PRO_ID"
    ].forEach(storageRemove);
  }

  function saveSession(raw, bridged = {}) {
    const data = normalizeResult(raw, bridged);

    const finalSlug = normalizeSlug(data.slug || bridged.slug || "");
    const finalPhone = normalizePhone(data.phone || bridged.phone || "");

    const session = {
      ok: true,
      module: MODULE,
      owner_id: data.owner_id || "",
      slug: finalSlug,
      phone: finalPhone,
      title: data.title || data.business_name || "",
      business_name: data.business_name || data.title || "",
      business_code: data.business_code || "LOC",
      created_at: now(),
      expires_at: now() + SESSION_TTL_MS
    };

    clearOldSessionKeys();

    storageSet(SESSION_KEY, JSON.stringify(session));
    storageSet(GENERIC_SESSION_KEY, JSON.stringify(session));

    storageSet(STORAGE_SLUG_KEY, session.slug);
    storageSet(STORAGE_LAST_SLUG, session.slug);
    storageSet("DIGIY_SLUG", session.slug);
    storageSet("digiy_slug", session.slug);

    if (session.owner_id) {
      storageSet("DIGIY_LOC_OWNER_ID", session.owner_id);
      storageSet("digiy_loc_owner_id", session.owner_id);
      storageSet("DIGIY_OWNER_ID", session.owner_id);
      storageSet("owner_id", session.owner_id);
      storageSet("DIGIY_PRO_ID", session.owner_id);
    }

    storageSet("DIGIY_LOC_BUSINESS_CODE", session.business_code);
    storageSet("DIGIY_BUSINESS_CODE", session.business_code);

    if (session.business_name) {
      storageSet("DIGIY_LOC_BUSINESS_NAME", session.business_name);
      storageSet("DIGIY_BUSINESS_NAME", session.business_name);
      storageSet("DIGIY_TITLE", session.business_name);
    }

    if (session.phone) {
      storageSet("DIGIY_PHONE", session.phone);
      storageSet("DIGIY_LOC_PHONE", session.phone);
      storageSet("digiy_loc_phone", session.phone);
    }

    return session;
  }

  if (!window.supabase || !SUPABASE_URL || !SUPABASE_ANON_KEY) {
    $("subtitle").textContent = "Configuration manquante";
    msg(`<span class="bad">❌ Configuration Supabase absente.</span>`);
    $("go").disabled = true;
    return;
  }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: false,
      autoRefreshToken: false,
      detectSessionInUrl: false,
      storage: {
        getItem: () => null,
        setItem: () => {},
        removeItem: () => {}
      }
    }
  });

  const url = new URL(location.href);
  const slug = normalizeSlug(url.searchParams.get("slug") || "");

  $("slugBox").textContent = slug || "—";
  $("subtitle").textContent = slug
    ? "Accès sécurisé — PIN requis"
    : "SLUG manquant";

  if (!slug) {
    msg(`<span class="bad">❌ SLUG manquant.</span><br>Reviens depuis ton lien GO PIN avec <b>?slug=...</b>.`);
    $("go").disabled = true;
    return;
  }

  function buildNextUrl(finalSlug) {
    const next = new URL(NEXT_URL, location.href);
    if (finalSlug) next.searchParams.set("slug", finalSlug);
    return next.toString();
  }

  async function resolveSlugToPhone(currentSlug) {
    const { data, error } = await sb
      .from("digiy_subscriptions_public")
      .select("slug, phone, module")
      .eq("slug", currentSlug)
      .maybeSingle();

    if (error) throw error;

    if (!data?.phone) return null;

    return {
      slug: normalizeSlug(data.slug || currentSlug),
      phone: normalizePhone(data.phone),
      module: String(data.module || MODULE).trim().toUpperCase()
    };
  }

  async function tryRpcDigiyVerifyPin(phone, pin) {
    const { data, error } = await sb.rpc("digiy_verify_pin", {
      p_phone: phone,
      p_module: MODULE,
      p_pin: pin
    });

    if (error) throw error;
    return data;
  }

  async function tryRpcVerifyAccessPin(currentSlug, pin) {
    const { data, error } = await sb.rpc("verify_access_pin", {
      p_slug: currentSlug,
      p_pin: pin
    });

    if (error) throw error;
    return data;
  }

  async function tryRpcLocPinLogin(currentSlug, pin) {
    const { data, error } = await sb.rpc("loc_pin_login", {
      p_slug: currentSlug,
      p_pin: pin
    });

    if (error) throw error;
    return data;
  }

  async function enter() {
    const pin = normalizePin($("pin").value);

    if (pin.length < 3) {
      msg(`<span class="bad">❌ PIN invalide.</span>`);
      return;
    }

    $("go").disabled = true;
    msg(`Vérification en cours…`);

    let bridge = null;
    try {
      bridge = await resolveSlugToPhone(slug);
    } catch (e) {
      $("go").disabled = false;
      msg(`<span class="bad">❌ Erreur lecture abonnement.</span><br>${String(e?.message || e)}`);
      return;
    }

    if (!bridge?.phone) {
      $("go").disabled = false;
      msg(`<span class="bad">❌ SLUG inconnu.</span><br>Aucun téléphone actif trouvé pour ce slug.`);
      return;
    }

    const attempts = [];

    try {
      const data = await tryRpcDigiyVerifyPin(bridge.phone, pin);
      attempts.push({ name: "digiy_verify_pin", data, error: null });
    } catch (e) {
      attempts.push({ name: "digiy_verify_pin", data: null, error: e });
    }

    if (!normalizeResult(attempts[0]?.data, bridge).ok) {
      try {
        const data = await tryRpcVerifyAccessPin(slug, pin);
        attempts.push({ name: "verify_access_pin", data, error: null });
      } catch (e) {
        attempts.push({ name: "verify_access_pin", data: null, error: e });
      }
    }

    const bestSoFar = attempts.find(x => normalizeResult(x.data, bridge).ok);

    if (!bestSoFar) {
      try {
        const data = await tryRpcLocPinLogin(slug, pin);
        attempts.push({ name: "loc_pin_login", data, error: null });
      } catch (e) {
        attempts.push({ name: "loc_pin_login", data: null, error: e });
      }
    }

    const success = attempts.find(x => normalizeResult(x.data, bridge).ok);

    if (!success) {
      $("go").disabled = false;

      const lastError =
        attempts.map(x => x.error && String(x.error?.message || x.error)).filter(Boolean).pop() || "";

      msg(
        `<span class="bad">❌ Accès refusé.</span><br>${
          lastError || "PIN incorrect ou rail PIN non disponible."
        }`
      );
      return;
    }

    const result = normalizeResult(success.data, {
      slug: bridge.slug,
      phone: bridge.phone,
      module: bridge.module
    });

    const session = saveSession(result, bridge);

    msg(`<span class="ok">✅ Accès validé.</span> Ouverture de ton espace…`);

    setTimeout(() => {
      location.href = buildNextUrl(session.slug || slug);
    }, 450);
  }

  $("go").addEventListener("click", enter);
  $("pin").addEventListener("keydown", (e) => {
    if (e.key === "Enter") enter();
  });

  setTimeout(() => $("pin").focus(), 150);
})();
</script>
</body>
</html>
