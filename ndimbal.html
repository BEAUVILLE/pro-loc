  <!-- ✅ CONFIG SUPABASE -->
  <script>
    window.DIGIY_SUPABASE_URL = "https://wesqmwjjtsefyjnluosj.supabase.co";
    window.DIGIY_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indlc3Ftd2pqdHNlZnlqbmx1b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUxNzg4ODIsImV4cCI6MjA4MDc1NDg4Mn0.dZfYOc2iL2_wRYL3zExZFsFSBK6AbMeOid2LrIjcTdA";
    window.DIGIY_SUPABASE_ANON = window.DIGIY_SUPABASE_ANON_KEY;
  </script>

  <!-- Supabase + Guard -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./guard.js?v=locpro-ndimbal-v2"></script>

  <style>
    :root{
      --bg:#020617; --bg2:#0b1020; --line:#1f2937;
      --ink:#f9fafb; --muted:#cbd5f5;
      --gold:#facc15; --green:#22c55e; --danger:#ef4444;
      --card:rgba(255,255,255,.03); --shadow:0 22px 50px rgba(0,0,0,.55);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(900px 520px at 12% -10%, rgba(250,204,21,.16), transparent 60%),
        radial-gradient(900px 520px at 90% 0%, rgba(34,197,94,.12), transparent 60%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      padding:16px;
    }
    .wrap{max-width:1100px;margin:0 auto}
    .top{
      display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;
      padding:12px;border:1px solid var(--line);border-radius:18px;background:var(--card);
      box-shadow:var(--shadow);
    }
    .brand{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .logo{
      width:44px;height:44px;border-radius:16px;
      background:linear-gradient(135deg, rgba(250,204,21,.35), rgba(34,197,94,.2));
      border:1px solid rgba(250,204,21,.35);
      box-shadow:0 0 22px rgba(250,204,21,.12);
      display:grid;place-items:center;color:#061b14;font-weight:1100;
    }
    h1{font-size:1.1rem;margin:0}
    .sub{color:var(--muted);font-weight:800;margin-top:4px;line-height:1.35}
    .pill{
      border:1px solid rgba(148,163,184,.35);
      padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.02);
      color:var(--muted);font-weight:900;font-size:.86rem;
    }
    .pill strong{color:#fff}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}
    .btn{
      border:1px solid var(--line); background:rgba(255,255,255,.04);
      color:#fff; font-weight:1000; cursor:pointer; text-decoration:none;
      border-radius:14px; padding:10px 12px; display:inline-flex; align-items:center; gap:8px;
    }
    .btn:hover{filter:brightness(1.08)}
    .btn.gold{background:rgba(250,204,21,.10);border-color:rgba(250,204,21,.35);color:#fde68a}
    .btn.green{background:rgba(34,197,94,.10);border-color:rgba(34,197,94,.35);color:#bbf7d0}
    .btn.red{background:rgba(239,68,68,.10);border-color:rgba(239,68,68,.35);color:#fecaca}
    .card{
      margin-top:14px;border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      border-radius:20px;box-shadow:var(--shadow);
      padding:14px;
    }
    .note{
      margin-top:10px;padding:10px 12px;border-radius:14px;border:1px solid rgba(148,163,184,.25);
      background:rgba(255,255,255,.03);color:var(--muted);font-weight:900;white-space:pre-wrap;display:none;
    }
    .note.ok{display:block;border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.09);color:#bbf7d0}
    .note.bad{display:block;border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.09);color:#fecaca}
    .note.warn{display:block;border-color:rgba(250,204,21,.35);background:rgba(250,204,21,.09);color:#fde68a}

    .tools{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;align-items:center}
    input{
      border-radius:14px;border:1px solid var(--line);
      background:rgba(0,0,0,.18);color:var(--ink);
      padding:11px 12px;font-weight:900;outline:none;min-width:260px;
    }
    input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(250,204,21,.15)}
    select{
      border-radius:14px;border:1px solid var(--line);
      background:rgba(0,0,0,.18);color:var(--ink);
      padding:11px 12px;font-weight:900;outline:none;
      min-width:180px;
    }
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;margin-top:12px}
    .item{
      border:1px solid rgba(148,163,184,.22);
      border-radius:16px;
      background:rgba(255,255,255,.02);
      padding:12px;
    }
    .title{font-weight:1100}
    .meta{margin-top:6px;color:var(--muted);font-weight:850;font-size:.92rem;line-height:1.35}
    .tagRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .tag{
      display:inline-flex;align-items:center;gap:7px;
      padding:6px 9px;border-radius:999px;
      border:1px solid rgba(148,163,184,.25);
      color:var(--muted);font-weight:950;font-size:.82rem;
    }
    .tag.ok{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.10);color:#bbf7d0}
    .tag.gold{border-color:rgba(250,204,21,.35);background:rgba(250,204,21,.10);color:#fde68a}
    .tag.red{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.10);color:#fecaca}

    @media (max-width:720px){
      input,select{min-width:100%}
      .btn{width:100%;justify-content:center}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logo">∞</div>
        <div>
          <h1>NDIMBAL LOC — Entraide nomade</h1>
          <div class="sub">Ton lieu reste ton point d’appui. On garde l’identifiant, on garde la main.</div>
        </div>
      </div>

      <div class="pill" id="pillSlug">Lieu : <strong>—</strong></div>
    </div>

    <div class="card">
      <div class="row">
        <a class="btn" id="btnBack" href="#">⬅️ Retour à mon espace</a>
        <button class="btn gold" id="btnReload" type="button">↻ Recharger</button>
        <span class="pill" id="pillCount">0 résultat</span>
      </div>

      <div class="tools">
        <select id="mode">
          <option value="office">🏢 Mon bureau (tout)</option>
          <option value="place">📍 Ce lieu (slug)</option>
        </select>

        <input id="q" placeholder="Recherche: nom, ville, tag…" />
        <button class="btn green" id="btnSearch" type="button">🔎 Chercher</button>
      </div>

      <div class="note warn" id="note"></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  const MODULE = "LOC";
  const NDIMBAL_VIEW = "v_ndimbal_loc";

  const $ = (id)=>document.getElementById(id);
  const note = $("note");
  const grid = $("grid");
  const pillCount = $("pillCount");
  const q = $("q");
  const mode = $("mode");

  let SLUG = "";
  let OWNER_ID = "";
  let PHONE = "";
  let BUSINESS_CODE = "";

  function show(msg, type){
    note.className = "note " + (type || "warn");
    note.textContent = msg || "";
    note.style.display = msg ? "block" : "none";
  }

  function clear(){
    show("", "warn");
    grid.innerHTML = "";
    pillCount.textContent = "0 résultat";
  }

  function esc(s){
    return String(s ?? "").replace(/[&<>"']/g, (m)=>({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[m]));
  }

  function storageGet(key){
    try{
      const s = sessionStorage.getItem(key);
      if (s) return s;
    }catch{}
    try{
      const l = localStorage.getItem(key);
      if (l) return l;
    }catch{}
    return "";
  }

  function getGuardState(){
    return window.DIGIY_GUARD?.state || {
      preview: true,
      access_ok: false,
      slug: "",
      phone: "",
      reason: "guard_missing"
    };
  }

  async function waitGuardReady(){
    if(!window.DIGIY_GUARD) throw new Error("guard_absent");
    const r = window.DIGIY_GUARD.ready;

    if(typeof r === "function"){
      const maybe = r(8000);
      if (maybe && typeof maybe.then === "function") return await maybe;
      return maybe;
    }

    if(r && typeof r.then === "function"){
      return await r;
    }

    if(r) return true;
    throw new Error("guard_not_ready");
  }

  function getSB(){
    return window.DIGIY_GUARD?.getSb?.()
      || window.DIGIY_GUARD?.getSupabase?.()
      || window.DIGIY_GUARD?.sb
      || window.sb
      || window.supabase.createClient(
          window.DIGIY_SUPABASE_URL,
          window.DIGIY_SUPABASE_ANON_KEY || window.DIGIY_SUPABASE_ANON,
          {
            auth:{
              persistSession:false,
              autoRefreshToken:false,
              detectSessionInUrl:false
            }
          }
        );
  }

  function getSlug(){
    const st = getGuardState();
    return (
      new URL(location.href).searchParams.get("slug") ||
      st.slug ||
      storageGet("digiy_loc_slug") ||
      storageGet("digiy_last_slug") ||
      storageGet("DIGIY_SLUG") ||
      ""
    ).trim().toLowerCase();
  }

  function withSlug(path){
    const slug = SLUG || getSlug();
    if(!slug) return path;

    try{
      const u = new URL(path, location.href);
      if(!u.searchParams.get("slug")) u.searchParams.set("slug", slug);
      if(u.origin === location.origin) return u.pathname + u.search + u.hash;
      return u.toString();
    }catch{
      const sep = path.includes("?") ? "&" : "?";
      return path + sep + "slug=" + encodeURIComponent(slug);
    }
  }

  function resolveSession(){
    const st = getGuardState();
    const sess = window.DIGIY_GUARD?.getSession?.() || null;

    OWNER_ID =
      sess?.owner_id ||
      sess?.ownerId ||
      storageGet("DIGIY_LOC_OWNER_ID") ||
      storageGet("digiy_loc_owner_id") ||
      storageGet("DIGIY_OWNER_ID") ||
      storageGet("owner_id") ||
      "";

    PHONE =
      sess?.phone ||
      st.phone ||
      storageGet("DIGIY_PHONE") ||
      storageGet("DIGIY_LOC_PHONE") ||
      "";

    BUSINESS_CODE =
      (sess?.business_code ||
      sess?.businessCode ||
      storageGet("DIGIY_LOC_BUSINESS_CODE") ||
      storageGet("DIGIY_BUSINESS_CODE") ||
      "").toString().trim().toUpperCase();
  }

  function pick(obj, keys){
    for(const k of keys){
      if(obj && obj[k] !== undefined && obj[k] !== null && String(obj[k]).trim() !== "") return obj[k];
    }
    return "";
  }

  function rankVal(obj){
    const r = pick(obj, ["featured_rank","rank","score","priority"]);
    const n = Number(r);
    return Number.isFinite(n) ? n : null;
  }

  function cardRow(obj){
    const title = pick(obj, ["title","name","nom","label","business_name","room_title"]) || "—";
    const city  = pick(obj, ["city","ville","zone","address_label","address","quartier"]);
    const cat   = (pick(obj, ["category","type","kind"]) || "loc").toString();
    const rnk   = rankVal(obj);
    const extra = pick(obj, ["phone","whatsapp","contact","partner_url"]);

    const tags = [];
    if(cat) tags.push(`<span class="tag gold">🏷️ ${esc(cat.toUpperCase())}</span>`);
    if(rnk !== null) tags.push(`<span class="tag ok">⭐ ${esc(String(rnk))}</span>`);
    if(pick(obj, ["ndimbal_enabled","ndimbal","is_ndimbal"]) === true) tags.push(`<span class="tag ok">🤍 NDIMBAL ON</span>`);

    const slug = pick(obj, ["slug","room_slug","business_slug"]);
    if(slug) tags.push(`<span class="tag">🔗 ${esc(String(slug))}</span>`);

    return `
      <div class="item">
        <div class="title">${esc(title)}</div>
        <div class="meta">
          ${city ? "📍 " + esc(city) + "<br>" : ""}
          ${extra ? "📞 " + esc(extra) : ""}
        </div>
        <div class="tagRow">
          ${tags.length ? tags.join("") : `<span class="tag">NDIMBAL</span>`}
        </div>
      </div>
    `;
  }

  function applySearch(rows, keyword){
    const k = (keyword || "").trim().toLowerCase();
    if(!k) return rows;
    return rows.filter(o => {
      try{
        return JSON.stringify(o || {}).toLowerCase().includes(k);
      }catch(_){
        return false;
      }
    });
  }

  function sortRows(rows){
    return rows.slice().sort((a,b)=>{
      const ra = rankVal(a); const rb = rankVal(b);

      if(ra !== null && rb !== null && ra !== rb) return ra - rb;
      if(ra !== null && rb === null) return -1;
      if(ra === null && rb !== null) return 1;

      const ta = String(pick(a, ["title","name","nom","label","business_name"]) || "");
      const tb = String(pick(b, ["title","name","nom","label","business_name"]) || "");
      return ta.localeCompare(tb);
    });
  }

  async function queryBySlug(sb){
    const tries = [
      { col: "slug", value: SLUG },
      { col: "room_slug", value: SLUG },
      { col: "business_slug", value: SLUG }
    ];

    for (const t of tries){
      try{
        const { data, error } = await sb.from(NDIMBAL_VIEW).select("*").eq(t.col, t.value).limit(250);
        if(!error) return { ok:true, rows:data || [], mode:`slug:${t.col}` };
      }catch{}
    }

    return { ok:false, rows:[], mode:"slug:none" };
  }

  async function queryByOwner(sb){
    if(!OWNER_ID) return { ok:false, rows:[], mode:"owner:none" };

    const tries = [
      { col: "owner_id", value: OWNER_ID },
      { col: "pro_id", value: OWNER_ID }
    ];

    for (const t of tries){
      try{
        const { data, error } = await sb.from(NDIMBAL_VIEW).select("*").eq(t.col, t.value).limit(250);
        if(!error) return { ok:true, rows:data || [], mode:`owner:${t.col}` };
      }catch{}
    }

    return { ok:false, rows:[], mode:"owner:none" };
  }

  async function load(){
    clear();

    if(!SLUG){
      show("⚠️ Lieu manquant.\n➡️ Ouvre NDIMBAL depuis ton espace avec un identifiant valide.", "bad");
      return;
    }

    const keyword = (q.value || "").trim();

    $("btnReload").disabled = true;
    $("btnSearch").disabled = true;
    mode.disabled = true;

    show("⏳ Chargement NDIMBAL…", "warn");

    try{
      const st = getGuardState();

      if(!st.access_ok){
        show("🔒 Accès non ouvert.\n➡️ Passe par PIN pour ouvrir le bureau réel.", "warn");
        grid.innerHTML = "";
        pillCount.textContent = "0 résultat";
        return;
      }

      const sb = getSB();
      const officeMode = mode.value === "office";

      let result;

      if(officeMode){
        result = await queryByOwner(sb);

        if(!result.ok || !result.rows.length){
          result = await queryBySlug(sb);
          const rows = sortRows(applySearch(result.rows || [], keyword));
          render(rows, true, result.mode);
          return;
        }

        const rows = sortRows(applySearch(result.rows || [], keyword));
        render(rows, false, result.mode);
        return;
      }

      result = await queryBySlug(sb);
      if(!result.ok){
        throw new Error("Impossible de lire v_ndimbal_loc avec le slug courant.");
      }

      const rows = sortRows(applySearch(result.rows || [], keyword));
      render(rows, false, result.mode);

    }catch(e){
      console.error(e);
      show(
        "❌ NDIMBAL indisponible.\n" +
        "➡️ Vérifie RLS/permissions sur v_ndimbal_loc.\n" +
        "➡️ Vérifie les colonnes de la vue (slug / owner_id / room_slug / business_slug).\n\n" +
        "Erreur: " + (e?.message || e),
        "bad"
      );
    }finally{
      $("btnReload").disabled = false;
      $("btnSearch").disabled = false;
      mode.disabled = false;
    }
  }

  function render(rows, fallbackUsed, queryMode){
    if(!rows.length){
      pillCount.textContent = "0 résultat";
      show(
        "ℹ️ Rien trouvé.\n" +
        (mode.value === "office"
          ? "➡️ Mode bureau: soit tu n’as pas d’éléments NDIMBAL, soit la vue ne renvoie rien pour ton owner_id."
          : "➡️ Mode lieu: aucun NDIMBAL pour ce slug."),
        "ok"
      );
      grid.innerHTML = "";
      return;
    }

    pillCount.textContent = rows.length + " résultat(s)";
    grid.innerHTML = rows.map(cardRow).join("");

    const info =
      "✅ NDIMBAL chargé." +
      (fallbackUsed ? "\n(Fallback appliqué vers le slug.)" : "") +
      (queryMode ? `\nquery: ${queryMode}` : "") +
      (OWNER_ID ? `\nowner_id: ${OWNER_ID}` : "") +
      (PHONE ? `\nphone: ${PHONE}` : "") +
      (BUSINESS_CODE ? `\nbusiness_code: ${BUSINESS_CODE}` : "");
    show(info, "ok");
  }

  async function init(){
    try{
      await waitGuardReady();
    }catch(e){
      show("❌ Guard absent ou non prêt.\n➡️ Vérifie ./guard.js puis recharge.", "bad");
      return;
    }

    SLUG = getSlug();
    resolveSession();

    $("pillSlug").innerHTML = `Lieu : <strong>${esc(SLUG || "—")}</strong>`;
    $("btnBack").href = withSlug("./app.html");

    $("btnReload").addEventListener("click", load);
    $("btnSearch").addEventListener("click", load);
    q.addEventListener("keydown", (e)=>{ if(e.key==="Enter") load(); });
    mode.addEventListener("change", load);

    load();
  }

  init();
})();
</script>
</body>
</html>
