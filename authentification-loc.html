<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>DIGIY LOC PRO — Connexion (PIN)</title>
  <meta name="theme-color" content="#F8FAF6"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./guard.js?v=locpro-2"></script>

  <style>
    :root{--bg:#F8FAF6;--card:#fff;--line:#E5E7EB;--text:#111827;--muted:#6B7280;--gold:#EAB308;--r:20px}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:16px;font-family:system-ui;background:radial-gradient(1000px 500px at 10% -10%, rgba(234,179,8,.18), transparent 60%),var(--bg);color:var(--text)}
    .card{width:min(520px,92vw);background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:0 12px 28px rgba(0,0,0,.06)}
    .logo{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;border:1px solid var(--line);background:linear-gradient(135deg,#FFF7D6,#FDE68A);color:#92400E;font-weight:950;font-size:20px}
    h1{margin:10px 0 0;font-size:18px}
    .sub{margin:4px 0 0;color:var(--muted);font-weight:700}
    label{display:block;margin:12px 0 8px;font-weight:950}
    input{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px;font-size:15px;outline:none}
    input:focus{border-color:rgba(234,179,8,.65);box-shadow:0 0 0 3px rgba(234,179,8,.18)}
    .btn{width:100%;border:0;border-radius:16px;padding:12px 14px;min-height:44px;font-weight:950;cursor:pointer;margin-top:14px;background:linear-gradient(135deg,#FFF7D6,#FDE68A);color:#78350F}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .btn2{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;min-height:44px;font-weight:950;cursor:pointer;margin-top:10px;background:#fff;color:#111827}
    .btn2:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:12px;padding:12px;border-radius:16px;border:1px solid var(--line);background:#F9FAFB;color:var(--muted);font-weight:800;white-space:pre-wrap}
    .msg.bad{border-color:rgba(239,68,68,.22);background:rgba(239,68,68,.06);color:#7f1d1d}
    .msg.ok{border-color:rgba(22,163,74,.25);background:rgba(22,163,74,.07);color:#14532d}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);font-weight:800}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">🏠</div>
    <h1>DIGIY LOC PRO</h1>
    <div class="sub">Connexion gestionnaire (téléphone + PIN)</div>

    <div class="row">
      <span class="pill">module: <span class="mono" id="pillModule">—</span></span>
      <span class="pill mono" id="pillSlug">slug: —</span>
    </div>

    <label>Téléphone</label>
    <input id="phone" type="tel" inputmode="tel" placeholder="+221 77..." autocomplete="tel"/>

    <label>PIN</label>
    <input id="pin" type="password" inputmode="numeric" placeholder="••••" autocomplete="one-time-code"/>

    <button class="btn" id="btn">Entrer</button>
    <button class="btn2" id="btnForgot" type="button">❓ PIN oublié</button>

    <div class="msg" id="msg">Initialisation…</div>
  </div>

  <script>
  (async function(){
    "use strict";

    const MODULE = "LOC";
    const SUPPORT_WA = "+221771342889";
    const NEXT_URL = "./planning.html";
    const SESSION_TTL_MS = 8 * 60 * 60 * 1000;

    const SESSION_KEY = "DIGIY_LOC_PRO_SESSION";
    const STORAGE_SLUG_KEY = "digiy_loc_slug";
    const STORAGE_LAST_SLUG = "digiy_last_slug";

    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");
    const btnForgot = document.getElementById("btnForgot");
    const phoneEl = document.getElementById("phone");
    const pinEl = document.getElementById("pin");
    const pillSlug = document.getElementById("pillSlug");
    const pillModule = document.getElementById("pillModule");

    pillModule.textContent = MODULE;

    function setMsg(t, cls){
      msg.className = "msg" + (cls ? (" " + cls) : "");
      msg.textContent = t;
    }

    function lock(on){
      const v = !!on;
      btn.disabled = v;
      btnForgot.disabled = v;
      phoneEl.disabled = v;
      pinEl.disabled = v;
    }

    function digitsOnly(v){
      return String(v || "").replace(/\D/g, "");
    }

    function normPhone(v){
      let d = digitsOnly(v);
      if (d.startsWith("00")) d = d.slice(2);
      if (d.startsWith("221") && d.length >= 12) return d;
      if (d.length === 9) return "221" + d;
      return d;
    }

    function withSlug(path){
      const slug = getSlug();
      if(!slug) return path;
      try{
        const u = new URL(path, location.href);
        if(!u.searchParams.get("slug")) u.searchParams.set("slug", slug);
        if(u.origin === location.origin) return u.pathname + u.search + u.hash;
        return u.toString();
      }catch{
        const sep = path.includes("?") ? "&" : "?";
        return path + sep + "slug=" + encodeURIComponent(slug);
      }
    }

    function now(){
      return Date.now();
    }

    function lsSet(k,v){
      try{ localStorage.setItem(k, String(v ?? "")); }catch(_){}
    }

    function lsRemove(k){
      try{ localStorage.removeItem(k); }catch(_){}
    }

    function safeJsonParse(x){
      try { return typeof x === "string" ? JSON.parse(x) : x; }
      catch { return null; }
    }

    function getSlug(){
      const st = window.DIGIY_GUARD?.state || {};
      if (st.slug) return String(st.slug).trim();

      try {
        return String(new URL(location.href).searchParams.get("slug") || "").trim().toLowerCase();
      } catch {
        return "";
      }
    }

    function getPinUrl(){
      try { return window.DIGIY_GUARD?.getPinUrl?.() || withSlug("./pin.html"); }
      catch { return withSlug("./pin.html"); }
    }

    function getPayUrl(){
      try { return window.DIGIY_GUARD?.getPayUrl?.() || withSlug("https://beauville.github.io/commencer-a-payer/?module=LOC"); }
      catch { return withSlug("https://beauville.github.io/commencer-a-payer/?module=LOC"); }
    }

    function normalizeResult(raw){
      const r = safeJsonParse(raw) || {};

      return {
        ok: !!r.ok,
        owner_id: r.owner_id || r.ownerId || r.pro_id || r.id || "",
        phone: r.phone || r.pro_phone || "",
        slug: r.slug || getSlug() || "",
        title: r.title || r.business_name || r.name || "",
        business_name: r.business_name || r.title || r.name || "",
        business_code: r.business_code || r.code || "TEST",
        error: r.error || r.reason || ""
      };
    }

    function saveSession(raw){
      const data = normalizeResult(raw);

      const session = {
        ok: true,
        module: MODULE,
        owner_id: data.owner_id,
        slug: data.slug,
        phone: data.phone || "",
        title: data.title || "",
        business_name: data.business_name || "",
        business_code: data.business_code || "TEST",
        created_at: now(),
        expires_at: now() + SESSION_TTL_MS
      };

      lsSet(SESSION_KEY, JSON.stringify(session));

      // slug memory
      lsSet(STORAGE_SLUG_KEY, session.slug);
      lsSet(STORAGE_LAST_SLUG, session.slug);
      lsSet("DIGIY_SLUG", session.slug);

      // owner context attendu par LOC cockpit
      lsSet("DIGIY_LOC_OWNER_ID", session.owner_id);
      lsSet("digiy_loc_owner_id", session.owner_id);
      lsSet("DIGIY_OWNER_ID", session.owner_id);
      lsSet("owner_id", session.owner_id);
      lsSet("DIGIY_PRO_ID", session.owner_id);

      // business context
      lsSet("DIGIY_LOC_BUSINESS_CODE", session.business_code);
      lsSet("DIGIY_BUSINESS_CODE", session.business_code);

      if (session.business_name) {
        lsSet("DIGIY_LOC_BUSINESS_NAME", session.business_name);
        lsSet("DIGIY_BUSINESS_NAME", session.business_name);
        lsSet("DIGIY_TITLE", session.business_name);
      } else {
        lsRemove("DIGIY_LOC_BUSINESS_NAME");
      }

      // phone
      if (session.phone) {
        lsSet("DIGIY_PHONE", session.phone);
        lsSet("DIGIY_LOC_PHONE", session.phone);
      }

      return session;
    }

    async function callPinRpc(phone, pin){
      const sb = window.DIGIY_GUARD?.getSb?.() || window.sb;
      if (!sb) throw new Error("supabase_not_ready");

      // priorité RPC dédiée LOC
      try{
        const { data, error } = await sb.rpc("loc_pin_login", {
          p_phone: phone,
          p_pin: pin,
          p_slug: getSlug()
        });
        if (!error && data) return data;
      }catch(_){}

      // fallback RPC générique
      const { data, error } = await sb.rpc("verify_access_pin", {
        p_slug: getSlug(),
        p_pin: pin
      });

      if (error) throw error;
      return data;
    }

    if(!window.DIGIY_GUARD || !window.DIGIY_GUARD.ready){
      setMsg("❌ Guard absent ou non chargé.", "bad");
      return;
    }

    lock(true);
    setMsg("⏳ Initialisation…");

    try{
      await window.DIGIY_GUARD.ready;
    }catch(e){
      setMsg("❌ Guard non prêt.", "bad");
      lock(false);
      return;
    }

    const slug = getSlug();
    pillSlug.textContent = "slug: " + (slug || "—");

    if(!slug){
      setMsg("❌ SLUG manquant.\n➡️ Ouvre depuis ton lien GO PIN avec ?slug=...", "bad");
      lock(false);
      return;
    }

    // si déjà vivant avec owner stocké, on repart direct
    const existingOwner =
      localStorage.getItem("DIGIY_LOC_OWNER_ID") ||
      localStorage.getItem("digiy_loc_owner_id") ||
      localStorage.getItem("DIGIY_OWNER_ID") ||
      localStorage.getItem("owner_id") ||
      "";

    const st = window.DIGIY_GUARD.state || {};
    if (st.access_ok && existingOwner) {
      location.replace(withSlug(NEXT_URL));
      return;
    }

    if (st.phone) {
      phoneEl.value = st.phone;
    }

    setMsg("Entre ton téléphone + PIN.");
    lock(false);

    if(!phoneEl.value) phoneEl.focus();
    else pinEl.focus();

    async function doLogin(){
      const rawPhone = (phoneEl.value || "").trim();
      const pin = (pinEl.value || "").trim();
      const phone = normPhone(rawPhone);

      if(!phone){
        setMsg("⚠️ Téléphone requis.\nExemple: +221771234567", "bad");
        phoneEl.focus();
        return;
      }

      if(!/^\d{4,8}$/.test(pin)){
        setMsg("⚠️ PIN invalide.\n➡️ 4 à 8 chiffres.", "bad");
        pinEl.focus();
        return;
      }

      lock(true);
      setMsg("⏳ Vérification PIN…");

      try{
        const rpcData = await callPinRpc(phone, pin);
        const result = normalizeResult(rpcData);

        if(!result.ok || !result.owner_id){
          setMsg(
            "❌ PIN incorrect ou session incomplète.\n" +
            (result.error ? ("Raison: " + result.error) : "Réessaie."),
            "bad"
          );
          lock(false);
          pinEl.focus();
          pinEl.select();
          return;
        }

        saveSession({
          ...result,
          phone
        });

        // refresh accès côté guard
        try { await window.DIGIY_GUARD.refresh?.(); } catch {}

        setMsg("✅ OK. Ouverture du planning…", "ok");
        location.replace(withSlug(NEXT_URL));

      }catch(e){
        console.error(e);
        setMsg("❌ Erreur réseau / Supabase / RPC.\n" + String(e?.message || e), "bad");
        lock(false);
      }
    }

    btn.addEventListener("click", doLogin);
    pinEl.addEventListener("keydown", (ev)=>{ if(ev.key === "Enter") doLogin(); });
    phoneEl.addEventListener("keydown", (ev)=>{ if(ev.key === "Enter") pinEl.focus(); });

    btnForgot.addEventListener("click", ()=>{
      const phone = normPhone((phoneEl.value || "").trim());
      const s = getSlug();

      const msgTxt =
`DIGIY • Support LOC PRO
Demande: Reset PIN

Module: ${MODULE}
Slug: ${s || "—"}
Téléphone: ${phone || "—"}

Merci. — DIGIY`;

      const wa = "https://wa.me/" + digitsOnly(SUPPORT_WA) + "?text=" + encodeURIComponent(msgTxt);
      location.href = wa;
    });
  })();
  </script>
</body>
</html>
