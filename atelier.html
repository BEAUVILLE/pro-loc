<!doctype html>
<html lang="fr" style="visibility:hidden">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="theme-color" content="#061b14">
<meta name="digiy-build" content="loc-atelier-strict-pin8h-20260716">
<title>PRO LOC — Atelier sécurisé</title>
<script>
window.DIGIY_MODULE="LOC";
window.DIGIY_ABOS_MODULE="LOC";
window.DIGIY_MODULE_LABEL="Je loue";
window.DIGIY_LOGIN_URL="./pin.html";
</script>
<script src="./guard.js?v=loc-strict-pin8h-20260716" onerror="location.replace('./pin.html')"></script>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:20px;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#f4fff8;background:linear-gradient(180deg,#0b2a1d,#061b14)}.box{width:min(520px,100%);padding:24px;border:1px solid rgba(255,255,255,.14);border-radius:24px;background:rgba(255,255,255,.06);text-align:center}.ico{font-size:34px}.msg{margin-top:10px;font-weight:900;color:#fde68a;line-height:1.45}.fallback{display:none;margin-top:14px}.fallback a{display:flex;min-height:52px;align-items:center;justify-content:center;border-radius:16px;background:#22c55e;color:#04160e;text-decoration:none;font-weight:1000}
</style>
</head>
<body>
<main class="box">
  <div class="ico">🧰</div>
  <div class="msg" id="message">Ouverture de l’atelier sécurisé…</div>
  <div class="fallback" id="fallback"><a href="./app.html">Retour à mes logements</a></div>
</main>
<script>
(async()=>{
  "use strict";
  const session=await window.DIGIY_GUARD.requireSession();
  if(!session)return;
  const source="https://raw.githubusercontent.com/BEAUVILLE/pro-loc/111726dac698f9d553543be586c8b78e6e7a0694/atelier.html";
  const response=await fetch(source,{cache:"no-store",credentials:"omit"});
  if(!response.ok)throw new Error("atelier source "+response.status);
  const html=await response.text();
  document.open();document.write(html);document.close();
})().catch(error=>{
  console.error("[PRO LOC atelier]",error);
  document.documentElement.style.visibility="visible";
  document.getElementById("message").textContent="L’atelier reste protégé, mais son moteur n’a pas pu être chargé.";
  document.getElementById("fallback").style.display="block";
});
</script>
</body>
</html>
