<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>DIGIY LOC — GO PIN</title>
<meta name="theme-color" content="#020617">

<style>
  :root{
    --bg:#020617;
    --card:#0b1224;
    --line:rgba(148,163,184,.22);
    --ink:#f9fafb;
    --muted:#9ca3af;
    --accent:#facc15;
    --ok:#22c55e;
    --danger:#fb7185;
    --shadow:0 22px 55px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,Segoe UI,Roboto}
  body{
    min-height:100vh;
    color:var(--ink);
    background:
      radial-gradient(circle at top, rgba(34,197,94,.10) 0, transparent 55%),
      radial-gradient(circle at 15% 85%, rgba(250,204,21,.10) 0, transparent 55%),
      linear-gradient(135deg,#020617,#0b1020);
    display:flex;
    justify-content:center;
    padding:14px;
  }
  .wrap{
    width:100%;
    max-width:980px;
    min-height:calc(100vh - 28px);
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding:10px 6px;
  }
  .brand{font-weight:950;font-size:16px;letter-spacing:.06em}
  .brand span{color:var(--accent)}
  .tag{
    font-size:12px;color:var(--muted);
    border:1px solid rgba(148,163,184,.35);
    padding:6px 10px;border-radius:999px;white-space:nowrap;
    background:rgba(2,6,23,.55);
  }
  .card{
    flex:1;
    background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
    border-radius:18px;
    border:1px solid rgba(250,204,21,.22);
    box-shadow:var(--shadow);
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .title{font-size:20px;font-weight:950;line-height:1.2}
  .sub{font-size:13px;color:#cbd5e1;line-height:1.5}
  .status{
    display:flex;
    gap:10px;
    align-items:center;
    border:1px solid var(--line);
    background:rgba(2,6,23,.55);
    padding:12px;
    border-radius:14px;
  }
  .dot{
    width:12px;height:12px;border-radius:999px;
    background:var(--accent);
    box-shadow:0 0 16px rgba(250,204,21,.35);
    flex:0 0 auto;
  }
  .statusTxt{display:flex;flex-direction:column;gap:2px}
  .statusBig{font-weight:950}
  .statusSmall{font-size:12px;color:var(--muted)}
  .actions{
    margin-top:auto;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }
  .btn{
    border:none;border-radius:999px;padding:11px 14px;
    font-size:14px;font-weight:950;cursor:pointer;
    display:flex;justify-content:center;align-items:center;gap:8px;
    text-decoration:none;
    flex:1;
    min-height:44px;
    white-space:nowrap;
    touch-action:manipulation;
  }
  .btn.ghost{
    background:rgba(15,23,42,.6);
    color:#e5e7eb;
    border:1px solid var(--line);
  }
  .btn.ok{
    background:rgba(34,197,94,.12);
    color:#bbf7d0;
    border:1px solid rgba(34,197,94,.55);
  }
  .btn.gold{
    background:rgba(250,204,21,.12);
    color:#fde68a;
    border:1px solid rgba(250,204,21,.35);
  }
  footer{
    text-align:center;
    color:var(--muted);
    font-size:11px;
    padding:6px 0 2px;
  }
  @media(max-width:520px){
    body{padding:0}
    .wrap{min-height:100vh}
    .card{border-radius:0}
    header{padding:12px}
  }
</style>
</head>

<body>
<div class="wrap">
  <header>
    <div class="brand">DIGIY <span>LOC</span></div>
    <div class="tag">0% commission · Paiement direct</div>
  </header>

  <div class="card">
    <div class="title" id="ttl">Ouverture du PIN…</div>
    <div class="sub" id="sub">On garde ton slug et on t’envoie vers le vrai accès PIN PRO LOC.</div>

    <div class="status">
      <div class="dot" id="dot"></div>
      <div class="statusTxt">
        <div class="statusBig" id="stBig">Chargement</div>
        <div class="statusSmall" id="stSmall">Merci de patienter une seconde…</div>
      </div>
    </div>

    <div class="actions">
      <a class="btn ghost" id="btnBack" href="#" rel="noopener">⬅️ Retour galerie</a>
      <a class="btn gold" id="btnPin" href="#">🔑 Ouvrir le PIN</a>
      <button class="btn ok" id="btnWa" type="button">📲 Parler à DIGIY</button>
    </div>
  </div>

  <footer>GO PIN · DIGIY LOC ♾️</footer>
</div>

<script>
(() => {
  "use strict";

  const GALLERY_URL = "https://beauville.github.io/digiy-loc/";
  const PIN_PAGE = "https://pro-loc.digiylyfe.com/pin.html";
  const TEAM_WA = "+221771342889";

  const LOC_SLUG_KEY = "digiy_loc_slug";
  const LAST_SLUG_KEY = "digiy_last_slug";

  const ttl = document.getElementById("ttl");
  const sub = document.getElementById("sub");
  const dot = document.getElementById("dot");
  const stBig = document.getElementById("stBig");
  const stSmall = document.getElementById("stSmall");
  const btnBack = document.getElementById("btnBack");
  const btnWa = document.getElementById("btnWa");
  const btnPin = document.getElementById("btnPin");

  btnBack.href = GALLERY_URL;

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  function digits(v){
    return String(v || "").replace(/\D/g, "");
  }

  function openWa(phone, msg){
    const d = digits(phone);
    if (!d) return;
    const url = "https://wa.me/" + d + (msg ? "?text=" + encodeURIComponent(msg) : "");
    window.open(url, "_blank", "noopener,noreferrer");
  }

  function setStatus(mode, big, small){
    stBig.textContent = big || "";
    stSmall.textContent = small || "";

    if (mode === "ok"){
      dot.style.background = "var(--ok)";
      dot.style.boxShadow = "0 0 16px rgba(34,197,94,.35)";
    } else if (mode === "err"){
      dot.style.background = "var(--danger)";
      dot.style.boxShadow = "0 0 16px rgba(251,113,133,.35)";
    } else {
      dot.style.background = "var(--accent)";
      dot.style.boxShadow = "0 0 16px rgba(250,204,21,.35)";
    }
  }

  function cleanSlug(s){
    const x = String(s || "").trim();
    if(!x) return "";
    return x
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/[^a-z0-9\-_]/g,"")
      .replace(/-+/g,"-")
      .replace(/^_+|_+$/g,"");
  }

  function safeSet(k, v){
    try { localStorage.setItem(k, String(v ?? "")); } catch(_){}
    try { sessionStorage.setItem(k, String(v ?? "")); } catch(_){}
  }

  function readSlug(){
    const qs = new URLSearchParams(location.search);
    return cleanSlug(
      qs.get("slug") ||
      sessionStorage.getItem(LOC_SLUG_KEY) ||
      sessionStorage.getItem(LAST_SLUG_KEY) ||
      localStorage.getItem(LOC_SLUG_KEY) ||
      localStorage.getItem(LAST_SLUG_KEY) ||
      ""
    );
  }

  function pinHref(slug){
    const u = new URL(PIN_PAGE, location.href);
    if (slug) u.searchParams.set("slug", slug);
    return u.toString();
  }

  function redirectToPin(slug){
    location.replace(pinHref(slug));
  }

  function fatal(title, message){
    ttl.textContent = title || "Erreur";
    sub.textContent = message || "Une erreur est survenue.";
    setStatus("err", title || "Erreur", message || "");
  }

  const slug = readSlug();

  btnWa.addEventListener("click", () => {
    const msg = slug
      ? `Bonjour DIGIY 👋\nJ’ai un souci pour ouvrir le PIN LOC (${slug}).`
      : `Bonjour DIGIY 👋\nJe n’arrive pas à ouvrir mon accès PIN LOC.`;
    openWa(TEAM_WA, msg);
  });

  window.addEventListener("DOMContentLoaded", async () => {
    if (!slug){
      btnPin.href = pinHref("");
      fatal("Slug manquant", "Lien incomplet. Exemple : go-pin.html?slug=loc-221770000111");
      return;
    }

    safeSet(LOC_SLUG_KEY, slug);
    safeSet(LAST_SLUG_KEY, slug);

    btnPin.href = pinHref(slug);

    ttl.textContent = slug;
    sub.textContent = "Ouverture du PIN propriétaire LOC…";
    setStatus("warn", "Vérification", "Slug mémorisé. Redirection en cours…");

    await sleep(450);

    setStatus("ok", "OK", "Ouverture du PIN…");
    redirectToPin(slug);
  });
})();
</script>
</body>
</html>
