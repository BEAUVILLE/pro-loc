<script>
(async()=>{
"use strict";
const $=id=>document.getElementById(id);
const esc=value=>String(value??"").replace(/[&<>\"]/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[ch]));
const digits=value=>String(value||"").replace(/\D/g,"");
const dateOnly=value=>{const text=String(value||"").trim();return text?text.slice(0,10):""};
const dateFr=value=>{const d=dateOnly(value);if(!d)return "Date non renseignée";const x=new Date(d+"T12:00:00");return Number.isNaN(x.getTime())?d:x.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})};
const money=value=>{const n=Number(value||0);return n?Math.round(n).toLocaleString("fr-FR").replace(/\u202f/g," ")+" FCFA":"Montant non renseigné"};
function normalize(row){return {id:String(row?.id||row?.booking_id||row?.ref||row?.reference||crypto.randomUUID()),client:String(row?.client_name||row?.customer_name||row?.guest_name||row?.client||row?.name||"Client"),phone:digits(row?.client_phone||row?.guest_phone||row?.phone||row?.telephone||""),room:String(row?.lodging||row?.logement||row?.room_name||row?.property_name||row?.room||"Logement"),checkin:dateOnly(row?.arrival_ymd||row?.arrival||row?.checkin||row?.start_date||row?.date_from),checkout:dateOnly(row?.departure_ymd||row?.departure||row?.checkout||row?.end_date||row?.date_to),amount:Number(row?.total_amount||row?.amount||row?.price||row?.total||0),status:String(row?.status||row?.booking_status||"pending").toLowerCase(),pay:String(row?.payment_status||row?.pay||row?.payment||"due").toLowerCase(),source:String(row?.source||row?.channel||"DIGIY")};}
function statusLabel(value){const v=String(value||"").toLowerCase();if(["confirmed","confirmé","confirme"].includes(v))return "Confirmée";if(["cancelled","canceled","annulé","annule"].includes(v))return "Annulée";if(["done","completed","terminé","termine"].includes(v))return "Terminée";return "En attente"}
function payLabel(value){const v=String(value||"").toLowerCase();return ["paid","payé","paye"].includes(v)?"Payée":"À régler"}
function getSb(){return window.supabase.createClient(window.DIGIY_SUPABASE_URL,window.DIGIY_SUPABASE_ANON_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}})}
async function fetchLive(slug){const attempts=[{fn:"digiy_loc_reservations_by_slug",args:{p_slug:slug}},{fn:"digiy_loc_get_reservations_by_slug",args:{p_slug:slug}},{fn:"digiy_loc_reservations_for_slug",args:{p_slug:slug}}];let lastError=null;for(const step of attempts){const {data,error}=await getSb().rpc(step.fn,step.args);if(error){lastError=error;continue}if(Array.isArray(data))return data;if(Array.isArray(data?.reservations))return data.reservations;if(Array.isArray(data?.data))return data.data;return []}throw lastError||new Error("Aucune RPC LOC disponible")}
function render(rows){const list=$("list"),empty=$("empty");list.innerHTML="";empty.hidden=rows.length>0;rows.forEach(row=>{const card=document.createElement("article");card.className="card";card.innerHTML=`<div class="row"><div><div class="name">${esc(row.client)}</div><div class="meta">${esc(row.room)}<br>${esc(dateFr(row.checkin))} → ${esc(dateFr(row.checkout))}</div></div><div class="amount">${esc(money(row.amount))}</div></div><div class="badges"><span class="badge">${esc(statusLabel(row.status))}</span><span class="badge">${esc(payLabel(row.pay))}</span><span class="badge">${esc(row.source)}</span></div>${row.phone?'<div class="actions"><button type="button">Contacter le client</button></div>':''}`;const button=card.querySelector("button");if(button)button.addEventListener("click",()=>{const msg=`Bonjour ${row.client}, je vous contacte au sujet de votre réservation LOC du ${dateFr(row.checkin)} au ${dateFr(row.checkout)}.`;location.href="https://wa.me/"+encodeURIComponent(row.phone)+"?text="+encodeURIComponent(msg)});list.appendChild(card)})}
async function load(){const status=$("status");status.hidden=false;status.className="status";status.textContent="Chargement des réservations…";$("reload").disabled=true;try{const session=await window.DIGIY_GUARD.requireSession({redirect:true,to:"./pin.html"});if(!session)return;const slug=String(session.slug||"").trim();if(!slug)throw new Error("Identifiant logement absent");const raw=await fetchLive(slug);const rows=raw.map(normalize).filter(row=>!/["']/.test("")&&row.checkin).sort((a,b)=>a.checkin.localeCompare(b.checkin));render(rows);status.hidden=true}catch(error){render([]);status.hidden=false;status.className="status err";status.textContent="Impossible de charger les réservations réelles. Réouvre ton accès PIN puis réessaie.";console.error("[PRO LOC reservations]",error)}finally{$("reload").disabled=false}}
$("reload").addEventListener("click",load);
await load();
})();
</script>
