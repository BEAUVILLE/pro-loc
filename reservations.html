<style>

.wrap{width:min(680px,100%);margin:auto}.top{display:flex;justify-content:space-between;gap:10px;margin-bottom:14px}.top a,.top button{min-height:46px;padding:9px 13px;border-radius:15px;border:1px solid var(--line);background:rgba(255,255,255,.07);color:#fff;text-decoration:none;font:inherit;font-weight:950}

<body>
<main class="wrap">
<div class="top"><a href="./accueil.html">← Accueil LOC</a><button id="reload" type="button">Recharger</button></div>
<section class="head"><div>PRO LOC · données Supabase</div><h1>Réservations réelles</h1><p class="lead">Demandes enregistrées dans la base LOC, sans mélange avec l’atelier local.</p><p class="status" id="status">Chargement…</p></section>
<section class="list" id="list"></section>
<div class="empty" id="empty" hidden>Aucune réservation réelle visible pour l’instant.</div>
<p class="foot">Paiement direct au propriétaire · 0 % commission DIGIY</p>
</main>
<script>
(async()=>{
"use strict";
const $=id=>document.getElementById(id);
const esc=v=>String(v??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const digits=v=>String(v||"").replace(/\D/g,"");
const dateOnly=v=>String(v||"").trim().slice(0,10);
const dateFr=v=>{const d=dateOnly(v);if(!d)return"Date non renseignée";const x=new Date(d+"T12:00:00");return Number.isNaN(x.getTime())?d:x.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})};
const money=v=>{const n=Number(v||0);return n?Math.round(n).toLocaleString("fr-FR")+" FCFA":"Montant non renseigné"};
function normalize(r){return{id:String(r?.id||r?.booking_id||r?.reference||crypto.randomUUID()),client:String(r?.client_name||r?.customer_name||r?.guest_name||r?.name||"Client"),phone:digits(r?.client_phone||r?.guest_phone||r?.phone||""),room:String(r?.lodging||r?.logement||r?.room_name||r?.property_name||r?.room||"Logement"),checkin:dateOnly(r?.arrival_ymd||r?.arrival||r?.checkin||r?.start_date||r?.date_from),checkout:dateOnly(r?.departure_ymd||r?.departure||r?.checkout||r?.end_date||r?.date_to),amount:Number(r?.total_amount||r?.amount||r?.price||r?.total||0),status:String(r?.status||r?.booking_status||"pending").toLowerCase(),pay:String(r?.payment_status||r?.payment||"due").toLowerCase(),source:String(r?.source||r?.channel||"DIGIY")}}
function rowsFrom(data){if(Array.isArray(data))return data;if(Array.isArray(data?.reservations))return data.reservations;if(Array.isArray(data?.data))return data.data;return[]}
function statusLabel(v){return["confirmed","confirmé","confirme"].includes(v)?"Confirmée":["cancelled","canceled","annulé","annule"].includes(v)?"Annulée":"En attente"}
function render(rows){$("list").innerHTML="";$("empty").hidden=rows.length>0;for(const row of rows){const card=document.createElement("article");card.className="card";card.innerHTML=`<div class="row"><div><div class="name">${esc(row.client)}</div><div class="meta">${esc(row.room)}<br>${esc(dateFr(row.checkin))} → ${esc(dateFr(row.checkout))}</div></div><div class="amount">${esc(money(row.amount))}</div></div><div class="badges"><span class="badge">${esc(statusLabel(row.status))}</span><span class="badge">${row.pay==="paid"?"Payée":"À régler"}</span><span class="badge">${esc(row.source)}</span></div>${row.phone?'<button class="contact" type="button">Contacter le client</button>':""}`;const b=card.querySelector("button");if(b)b.onclick=()=>location.href="https://wa.me/"+row.phone+"?text="+encodeURIComponent(`Bonjour ${row.client}, je vous contacte au sujet de votre réservation LOC du ${dateFr(row.checkin)} au ${dateFr(row.checkout)}.`);$("list").appendChild(card)}}
async function load(){const status=$("status");status.hidden=false;status.className="status";status.textContent="Chargement des réservations…";$("reload").disabled=true;try{const session=await window.DIGIY_GUARD.requireSession({redirect:true});if(!session)return;const slug=String(session.slug||"").trim();if(!slug)throw new Error("Identifiant LOC absent");const sb=window.supabase.createClient(window.DIGIY_SUPABASE_URL,window.DIGIY_SUPABASE_ANON_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false}});const{data,error}=await sb.rpc("digiy_loc_reservations_by_slug",{p_slug:slug});if(error)throw error;const rows=rowsFrom(data).map(normalize).filter(r=>r.checkin).sort((a,b)=>a.checkin.localeCompare(b.checkin));render(rows);status.hidden=true}catch(error){render([]);status.className="status err";status.textContent="Impossible de charger les réservations réelles. Réouvre ton accès PIN puis réessaie.";console.error("[PRO LOC reservations]",error)}finally{$("reload").disabled=false}}
$("reload").onclick=load;
await load();
})();
</script>
