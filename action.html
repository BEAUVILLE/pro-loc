<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>DIGIY GO LOC</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0b5f34">
<style>
*{box-sizing:border-box}body{margin:0;min-height:100dvh;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#0b5f34,#04130d);color:white;padding:10px;font-weight:900}a{color:inherit;text-decoration:none}button,textarea{font:inherit}.wrap{width:min(860px,100%);margin:auto}.top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}.top b{color:#fff3cf}.top a{font-size:12px;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:8px 10px;background:rgba(255,255,255,.08)}.box{border:1px solid rgba(246,196,83,.36);border-radius:22px;background:rgba(255,255,255,.07);padding:12px;box-shadow:0 18px 44px rgba(0,0,0,.24)}h1{font-size:clamp(34px,9vw,58px);line-height:.9;letter-spacing:-.06em;margin:4px 0 8px}.gold{color:#f6c453}.lead{font-size:14px;line-height:1.36;color:rgba(255,255,255,.82);margin:0 0 10px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.models{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0}.model{min-height:62px;border-radius:14px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.07);color:white;padding:8px;text-align:left;font-weight:1000}.model small{display:block;color:#fff3cf;font-size:11px;margin-bottom:3px}.model span{font-size:12px;color:rgba(255,255,255,.82)}label{display:block;color:#fff3cf;font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin:8px 0 5px}textarea{width:100%;min-height:86px;border-radius:16px;border:1px solid rgba(246,196,83,.28);background:#06140f;color:white;padding:12px;font-size:16px;font-weight:850;outline:none;resize:vertical}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:8px}.valid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}button{cursor:pointer}.btn,.vbtn{min-height:42px;border:1px solid rgba(255,255,255,.16);border-radius:13px;background:rgba(255,255,255,.08);color:white;padding:7px 6px;font-size:11.5px;font-weight:1000;line-height:1.08}.main{background:linear-gradient(135deg,#fff1bd,#f6c453,#22c55e);color:#06140f}.pay{background:linear-gradient(135deg,#bbf7d0,#22c55e,#f6c453);color:#06140f;border-color:rgba(34,197,94,.55);box-shadow:0 8px 18px rgba(0,0,0,.18)}.state{margin-top:8px;border:1px dashed rgba(246,196,83,.28);border-radius:14px;background:rgba(0,0,0,.16);padding:9px;font-size:12.5px;color:#dfffe9;line-height:1.3}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chips span{font-size:10px;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:5px 8px;color:rgba(255,255,255,.8)}@media(max-width:520px){body{padding:8px}.row{grid-template-columns:1fr}.models{grid-template-columns:1fr 1fr}.actions{grid-template-columns:1fr 1fr}.vbtn{min-height:38px;font-size:10.5px;padding:5px 4px}.chips{display:none}}@media(max-width:360px){.models{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="wrap">
  <div class="top"><b>🏠 DIGIY GO LOC</b><a href="./hub.html">← HUB</a></div>
  <section class="box">
    <h1>Parle logement.<br><span class="gold">DIGIY prépare.</span></h1>
    <p class="lead">LOC prépare. L’hôte valide. Rien n’est réservé ni payé automatiquement.</p>

    <div class="models">
      <button class="model" data-route="LOC" data-t="chambre du 25 au 27 pour deux personnes"><small>🛏️ Demande</small><span>chambre du 25 au 27</span></button>
      <button class="model" data-route="PLANNING" data-t="bloquer les dates du 25 au 27 après validation"><small>📅 Planning</small><span>bloquer dates</span></button>
      <button class="model" data-route="PAY" data-t="acompte logement 20000 Wave"><small>💳 Acompte</small><span>vers PAY</span></button>
      <button class="model" data-route="PAY" data-t="dépense ménage logement 5000 cash"><small>🧹 Dépense</small><span>ménage</span></button>
      <button class="model" data-route="PAY" data-t="reste à recevoir logement 15000 Wave"><small>🤝 Reste</small><span>à recevoir</span></button>
      <button class="model" data-route="LOC" data-t="prépare message disponibilité pour client Awa"><small>📲 Message</small><span>client</span></button>
    </div>

    <label for="txt">Ce qu’ACTION prépare</label>
    <textarea id="txt">acompte logement 20000 Wave</textarea>

    <div class="actions">
      <button class="btn main" id="listen">🎙️ Écouter</button>
      <button class="btn" id="prepare">⚡ Préparer</button>
      <button class="btn" id="copy">📋 Copier</button>
      <button class="btn" id="clear">🧹 Effacer</button>
    </div>

    <div class="valid">
      <button class="vbtn" id="note">📝 Note</button>
      <button class="vbtn" id="planning">📅 Planning</button>
      <button class="vbtn pay" id="pay">💳 PAY</button>
    </div>

    <div class="state" id="state">PAY est actif. Clique PAY pour envoyer le brouillon LOC vers la transition.</div>
    <div class="chips"><span>pavés courts</span><span>validation humaine</span><span>LOC garde le logement</span><span>PAY garde l’argent</span></div>
  </section>
</main>
<script>
(function(){
  const txt=document.getElementById('txt'), state=document.getElementById('state');
  let route='PAY', rec=null;
  function norm(v){return String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
  function amount(v){const m=String(v||'').match(/(\d[\d\s.,]*)/);return m?Number(String(m[1]).replace(/[^0-9]/g,'')):null}
  function channel(v){const t=norm(v);if(t.includes('orange'))return'Orange Money';if(t.includes('carte'))return'Carte';if(t.includes('cash')||t.includes('espece'))return'Cash';return'Wave'}
  function type(v){const t=norm(v);if(/depense|menage|nettoyage|achat|sortie/.test(t))return'expense';if(/reste|recevoir|dette|doit|credit/.test(t))return'receivable';return'income'}
  function label(tp){return tp==='expense'?'Dépense':tp==='receivable'?'À recevoir':'Recette'}
  function cat(tp,v){const t=norm(v);if(tp==='expense')return t.includes('menage')?'Ménage LOC':'Dépense logement';if(tp==='receivable')return'Reste à recevoir LOC';return'Acompte LOC'}
  function set(msg){state.textContent=msg}
  function payload(r){const text=txt.value.trim(), tp=type(text);return{source:'LOC',module:'LOC',target:r==='PAY'?'PAY':r==='PLANNING'?'LOC_PLANNING':'LOC_NOTE',route:r,text,note:text,amount:amount(text),currency:amount(text)?'XOF':'',channel:channel(text),payType:tp,type:tp,typeLabel:label(tp),category:cat(tp,text),who:'Client LOC',status:'draft_validated_by_host',requiresHumanValidation:true,proofRef:'LOC-PAY-'+Date.now()+'-'+Math.random().toString(36).slice(2,8),createdAt:new Date().toISOString(),safety:{noAutoBooking:true,noAutoPayment:true,noAutoConfirmation:true,humanValidationRequired:true}}}
  function save(key,obj,limit){try{const list=JSON.parse(localStorage.getItem(key)||'[]');list.unshift(obj);localStorage.setItem(key,JSON.stringify(list.slice(0,limit||80)))}catch(e){}}
  document.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{txt.value=b.dataset.t||'';route=b.dataset.route||'LOC';set(route==='PAY'?'PAY prêt. Clique PAY.':route==='PLANNING'?'Planning prêt.':'Note prête.')});
  document.getElementById('prepare').onclick=()=>{const t=norm(txt.value);route=/acompte|solde|recette|depense|menage|reste|recevoir|wave|cash|orange|carte|\d/.test(t)?'PAY':/bloquer|date|planning|reserve|reserv/.test(t)?'PLANNING':'LOC';set(route==='PAY'?'PAY prêt. Clique PAY.':route==='PLANNING'?'Planning prêt.':'Note prête.')};
  document.getElementById('copy').onclick=async()=>{try{await navigator.clipboard.writeText(txt.value);set('Copié.')}catch(e){prompt('Copie le texte :',txt.value)}};
  document.getElementById('clear').onclick=()=>{txt.value='';set('Effacé.')};
  document.getElementById('note').onclick=()=>{const p=payload('LOC');save('DIGIY_LOC_ACTION_NOTES',p);localStorage.setItem('DIGIY_LOC_PENDING_NOTE',JSON.stringify(p));set('Note LOC gardée.')};
  document.getElementById('planning').onclick=()=>{const p=payload('PLANNING');save('DIGIY_LOC_ACTION_PLANNING',p);localStorage.setItem('DIGIY_LOC_PENDING_PLANNING',JSON.stringify(p));set('Planning LOC gardé.')};
  document.getElementById('pay').onclick=()=>{const p=payload('PAY');localStorage.setItem('DIGIY_PAY_PENDING_MOVEMENT',JSON.stringify(p));localStorage.setItem('DIGIY_LOC_PAY_BRIDGE',JSON.stringify(p));localStorage.setItem('DIGIY_LOC_LATEST_ACTION',JSON.stringify(p));set('Ouverture PAY…');location.href='./pay-transition.html?from=LOC#from=loc-action'};
  function speech(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){document.getElementById('listen').textContent='🎙️ Micro non dispo';return}rec=new SR();rec.lang='fr-FR';rec.interimResults=true;rec.onstart=()=>set('J’écoute...');rec.onend=()=>set('Prêt.');rec.onerror=()=>set('Micro fragile.');rec.onresult=e=>{let v='';for(let i=e.resultIndex;i<e.results.length;i++)v+=e.results[i][0].transcript;txt.value=v.trim();document.getElementById('prepare').click()}}
  speech();document.getElementById('listen').onclick=()=>{if(!rec){set('Micro non disponible.');return}try{rec.start()}catch(e){set('Micro déjà lancé.')}};
})();
</script>
</body>
</html>
