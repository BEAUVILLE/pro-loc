<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>DIGIY LOC PRO — QR</title>

  <script>
    window.DIGIY_MODULE = "LOC";
    window.DIGIY_LOGIN_URL = "./pin.html";
    window.DIGIY_SUPABASE_URL =
      window.DIGIY_SUPABASE_URL || "https://wesqmwjjtsefyjnluosj.supabase.co";
    window.DIGIY_SUPABASE_ANON_KEY =
      window.DIGIY_SUPABASE_ANON_KEY || "sb_publishable_tGHItRgeWDmGjnd0CK1DVQ_BIep4Ug3";
    window.DIGIY_SUPABASE_ANON =
      window.DIGIY_SUPABASE_ANON || window.DIGIY_SUPABASE_ANON_KEY;
  </script>

  <!-- QR lib -->
  <script id="qr-lib-primary" src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>

  <!-- Guard LOC -->
  <script src="./guard.js?v=locpro-final"></script>

  <style>
    :root{
      --bg:#020617;
      --card:#052e16;
      --accent:#facc15;
      --muted:#9ca3af;
      --text:#e5e7eb;
      --line:rgba(148,163,184,0.18);
      --danger:#ef4444;
      --ok:#22c55e;
      --shadow:0 18px 60px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(250,204,21,.09), transparent 40%),
        radial-gradient(circle at 90% 100%, rgba(34,197,94,.10), transparent 45%),
        linear-gradient(135deg,#020617,#062e16);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{max-width:760px;margin:auto;padding:18px}
    h1{font-size:1.4rem;margin-bottom:6px}
    p{color:var(--muted);margin-bottom:14px;line-height:1.35}

    .card{
      background:rgba(255,255,255,0.03);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      margin-top:14px;
      box-shadow:var(--shadow);
    }

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

    .btn{
      width:100%;
      padding:12px;
      border-radius:12px;
      font-weight:900;
      border:none;
      cursor:pointer;
      margin-top:10px;
      min-height:48px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:transform .12s ease, filter .12s ease, opacity .12s ease;
    }
    .btn:hover:not(:disabled){transform:translateY(-1px);filter:brightness(1.05)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn.primary{background:var(--accent);color:#022c22}
    .btn.ghost{
      background:transparent;
      border:1px solid rgba(250,204,21,0.35);
      color:#fff;
    }
    .btn.good{
      background:rgba(34,197,94,.14);
      border:1px solid rgba(34,197,94,.35);
      color:#bbf7d0;
    }

    .mini{margin-top:10px;color:var(--muted);font-size:.9rem}
    .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace}

    .note{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      display:none;
      white-space:pre-wrap;
      line-height:1.35;
      font-weight:850;
    }
    .note.ok{display:block;border-color:rgba(34,197,94,.35);color:#bbf7d0;background:rgba(34,197,94,.08)}
    .note.bad{display:block;border-color:rgba(239,68,68,.35);color:#fecaca;background:rgba(239,68,68,.08)}
    .note.warn{display:block;border-color:rgba(250,204,21,.35);color:#fde68a;background:rgba(250,204,21,.08)}

    .qrbox{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:16px;
      border-radius:16px;
      border:1px dashed rgba(250,204,21,0.35);
      background:rgba(0,0,0,0.12);
      margin-top:12px;
      min-height:220px;
    }
    canvas{
      max-width:100%;
      height:auto;
      border-radius:12px;
      background:#fff;
      padding:10px;
      display:block;
    }

    .label{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,0.12);
      line-height:1.35;
      word-break:break-all;
    }
    .label b{color:#fff}
    .hr{height:1px;background:rgba(148,163,184,0.18);margin-top:12px}
    .pillRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .pill{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:#cbd5e1;
      font-weight:900;
      font-size:.9rem;
    }

    @media (max-width:680px){
      .wrap{padding:14px}
    }
  </style>
</head>

<body>
<div class="wrap">
  <h1>📎 QR du logement</h1>
  <p>Un seul QR = <b>QR-PRO</b>. Derrière, QR-PRO propose APP / Public / Accès.</p>

  <div class="card">
    <div class="pillRow">
      <div class="pill" id="pillSlug">slug: —</div>
      <div class="pill" id="pillState">session: —</div>
    </div>

    <div class="row">
      <button class="btn ghost" id="btnBack" type="button">⬅️ Retour cockpit</button>
      <button class="btn primary" id="btnCopy" type="button">📋 Copier lien QR-PRO</button>
    </div>

    <div class="row">
      <button class="btn good" id="btnOpen" type="button">↗️ Ouvrir QR-PRO</button>
      <button class="btn primary" id="btnDownload" type="button">⬇️ Télécharger QR (PNG)</button>
      <button class="btn ghost" id="btnSticker" type="button">🟩 Télécharger Sticker XL (PNG)</button>
    </div>

    <div class="qrbox">
      <canvas id="qr"></canvas>
    </div>

    <div class="label mono" id="urlBox">URL: —</div>
    <div class="note warn" id="note"></div>

    <div class="hr"></div>
    <div class="mini mono" id="dbg"></div>
  </div>
</div>

<script>
(async function(){
  "use strict";

  const QR_PRO_BASE = "https://beauville.github.io/digiy-qr-pro/";
  const QR_LIB_SOURCES = [
    "https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js",
    "https://unpkg.com/qrcode@1.5.4/build/qrcode.min.js"
  ];

  const qrCanvas = document.getElementById("qr");
  const urlBox = document.getElementById("urlBox");
  const noteEl = document.getElementById("note");
  const dbgEl = document.getElementById("dbg");
  const pillSlug = document.getElementById("pillSlug");
  const pillState = document.getElementById("pillState");

  const btnDownload = document.getElementById("btnDownload");
  const btnSticker  = document.getElementById("btnSticker");
  const btnBack     = document.getElementById("btnBack");
  const btnCopy     = document.getElementById("btnCopy");
  const btnOpen     = document.getElementById("btnOpen");

  let slug = "";
  let url = "";
  let busy = false;

  function note(msg, type){
    noteEl.className = "note " + (type || "warn");
    noteEl.textContent = msg || "";
    noteEl.style.display = msg ? "block" : "none";
  }

  function setBusy(on){
    busy = !!on;
    btnDownload.disabled = on;
    btnSticker.disabled = on;
    btnCopy.disabled = on;
    btnOpen.disabled = on;
    btnBack.disabled = on;
  }

  function getQrApi(){
    if(window.QRCode){
      if(typeof window.QRCode.toCanvas === "function") return window.QRCode;
      if(typeof window.QRCode.toDataURL === "function") return window.QRCode;
    }
    if(window.qrcode){
      if(typeof window.qrcode.toCanvas === "function") return window.qrcode;
      if(typeof window.qrcode.toDataURL === "function") return window.qrcode;
    }
    return null;
  }

  function loadScriptOnce(src){
    return new Promise((resolve, reject) => {
      const existing = Array.from(document.scripts).find(s => s.src === src);
      if(existing){
        if(getQrApi()) return resolve(true);

        let done = false;
        const ok = () => {
          if(done) return;
          done = true;
          resolve(true);
        };
        const ko = () => {
          if(done) return;
          done = true;
          reject(new Error("load_failed:" + src));
        };

        existing.addEventListener("load", ok, { once:true });
        existing.addEventListener("error", ko, { once:true });

        setTimeout(() => {
          if(done) return;
          if(getQrApi()) ok();
          else ko();
        }, 4500);

        return;
      }

      const s = document.createElement("script");
      s.src = src;
      s.async = true;

      let done = false;
      s.onload = () => {
        if(done) return;
        done = true;
        resolve(true);
      };
      s.onerror = () => {
        if(done) return;
        done = true;
        reject(new Error("load_failed:" + src));
      };

      document.head.appendChild(s);

      setTimeout(() => {
        if(done) return;
        if(getQrApi()){
          done = true;
          resolve(true);
        }else{
          done = true;
          reject(new Error("load_timeout:" + src));
        }
      }, 6000);
    });
  }

  async function ensureQrLib(){
    let api = getQrApi();
    if(api) return api;

    let lastErr = null;

    for(const src of QR_LIB_SOURCES){
      try{
        await loadScriptOnce(src);
        api = getQrApi();
        if(api) return api;
      }catch(err){
        lastErr = err;
        console.warn("QR fallback failed:", src, err);
      }
    }

    throw lastErr || new Error("qr_lib_unavailable");
  }

  function getGuardSession(){
    const st = window.DIGIY_GUARD?.state || {};
    const raw = window.DIGIY_GUARD?.getSession?.() || {};

    return {
      ok: !!st.access_ok,
      phone: String(st.phone || raw.phone || "").trim(),
      slug: String(st.slug || raw.slug || "").trim()
    };
  }

  async function bootGuardSafe(){
    try{
      if(window.DIGIY_GUARD?.ready){
        await window.DIGIY_GUARD.ready();
      }
    }catch(e){
      console.warn("guard ready failed", e);
    }
  }

  function getSlugSafe(){
    const sess = getGuardSession();
    const qsSlug = new URLSearchParams(location.search).get("slug") || "";
    return String(sess.slug || window.DIGIY_GUARD?.state?.slug || qsSlug || "").trim();
  }

  function withSlug(path){
    const u = new URL(path, location.href);
    if(slug) u.searchParams.set("slug", slug);
    return u.toString();
  }

  function syncOwnSlug(){
    const u = new URL(location.href);
    if(slug) u.searchParams.set("slug", slug);
    else u.searchParams.delete("slug");
    history.replaceState({}, "", u.toString());
  }

  async function copyText(text){
    if(navigator.clipboard?.writeText){
      return navigator.clipboard.writeText(text);
    }

    const ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    let ok = false;
    try{
      ok = document.execCommand("copy");
    }catch(_){}
    ta.remove();

    if(!ok) throw new Error("copy_failed");
  }

  async function gen(size){
    const QR = await ensureQrLib();

    if(typeof QR.toCanvas === "function"){
      return QR.toCanvas(qrCanvas, url, {
        errorCorrectionLevel: "M",
        margin: 2,
        width: size
      });
    }

    if(typeof QR.toDataURL === "function"){
      const dataUrl = await QR.toDataURL(url, {
        errorCorrectionLevel: "M",
        margin: 2,
        width: size
      });

      const img = new Image();
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = dataUrl;
      });

      const ctx = qrCanvas.getContext("2d");
      qrCanvas.width = img.width;
      qrCanvas.height = img.height;
      ctx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);
      ctx.drawImage(img, 0, 0);

      return;
    }

    throw new Error("qr_api_missing");
  }

  function downloadCanvasPng(filename){
    const a = document.createElement("a");
    a.download = filename;
    a.href = qrCanvas.toDataURL("image/png");
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  await bootGuardSafe();

  slug = getSlugSafe();
  if(!slug){
    alert("❌ slug manquant. Ouvre via le cockpit LOC (slug obligatoire).");
    return;
  }

  const sess = getGuardSession();
  pillSlug.textContent = "slug: " + slug;
  pillState.textContent = sess.ok ? ("session: OK" + (sess.phone ? " · " + sess.phone : "")) : "session: aperçu / slug";

  syncOwnSlug();

  const qrProUrl = new URL(QR_PRO_BASE);
  qrProUrl.searchParams.set("slug", slug);
  url = qrProUrl.toString();

  urlBox.textContent = `URL: ${url}`;
  dbgEl.textContent = `slug: ${slug} | qr-base: ${QR_PRO_BASE}`;

  btnBack.onclick = () => {
    location.href = withSlug("./app.html");
  };

  btnCopy.onclick = async () => {
    try{
      await copyText(url);
      note("✅ Lien QR-PRO copié.", "ok");
    }catch(e){
      console.error(e);
      note("⚠️ Clipboard bloqué. Copie manuelle dans l’URL.", "warn");
    }
  };

  btnOpen.onclick = () => window.open(url, "_blank", "noopener");

  try{
    note("⏳ Génération du QR…", "warn");
    await gen(520);
    note("✅ QR-PRO prêt. Test téléphone avant impression.", "ok");
  }catch(e){
    console.error(e);
    note("❌ Erreur QR: " + (e?.message || e), "bad");
    return;
  }

  btnDownload.onclick = async () => {
    if(busy) return;
    setBusy(true);
    try{
      note("⏳ Génération PNG…", "warn");
      await gen(520);
      downloadCanvasPng(`DIGIY_QR_PRO_${slug}.png`);
      note("⬇️ Téléchargement lancé (QR normal).", "ok");
    }catch(e){
      console.error(e);
      note("❌ Download KO: " + (e?.message || e), "bad");
    }finally{
      setBusy(false);
    }
  };

  btnSticker.onclick = async () => {
    if(busy) return;
    setBusy(true);
    try{
      note("🟩 Génération Sticker XL…", "warn");
      await gen(900);
      downloadCanvasPng(`DIGIY_STICKER_XL_${slug}.png`);
      note("⬇️ Sticker XL téléchargé.", "ok");
      await gen(520);
    }catch(e){
      console.error(e);
      note("❌ Sticker XL KO: " + (e?.message || e), "bad");
    }finally{
      setBusy(false);
    }
  };

})();
</script>
</body>
</html>
