<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="description" content="Je loue — prépare et partage ton QR d’accès DIGIY pour ouvrir ton espace, ta fiche publique et ton entrée sécurisée." />
  <title>Je loue • Mon QR DIGIY</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800;900&display=swap" rel="stylesheet" />

  <script>
    window.DIGIY_MODULE = "LOC";
    window.DIGIY_LOGIN_URL = "./pin.html";
    window.DIGIY_SUPABASE_URL =
      window.DIGIY_SUPABASE_URL || "https://wesqmwjjtsefyjnluosj.supabase.co";
    window.DIGIY_SUPABASE_ANON_KEY =
      window.DIGIY_SUPABASE_ANON_KEY || "sb_publishable_tGHItRgeWDmGjnd0CK1DVQ_BIep4Ug3";
    window.DIGIY_SUPABASE_ANON =
      window.DIGIY_SUPABASE_ANON || window.DIGIY_SUPABASE_ANON_KEY;
  </script>
  <!-- QR local/offline : place le fichier qrcode.min.js dans ce même dépôt -->
  <script src="./qrcode.min.js?v=digiy-local-1"></script>
  <script src="./guard.js?v=locpro-final-human-front"></script>

  <style>
    :root{
      --bg:#020617;
      --card:#052e16;
      --accent:#facc15;
      --muted:#9ca3af;
      --text:#e5e7eb;
      --line:rgba(148,163,184,0.18);
      --danger:#ef4444;
      --ok:#22c55e;
      --shadow:0 18px 60px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:"Outfit",system-ui,-apple-system,sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(250,204,21,.09), transparent 40%),
        radial-gradient(circle at 90% 100%, rgba(34,197,94,.10), transparent 45%),
        linear-gradient(135deg,#020617,#062e16);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{max-width:760px;margin:auto;padding:18px}
    h1{font-size:1.42rem;margin-bottom:6px;font-weight:950}
    p{color:var(--muted);margin-bottom:14px;line-height:1.4;font-weight:700}

    .card{
      background:rgba(255,255,255,0.03);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      margin-top:14px;
      box-shadow:var(--shadow);
    }

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

    .btn{
      width:100%;
      padding:12px;
      border-radius:12px;
      font-weight:900;
      border:none;
      cursor:pointer;
      margin-top:10px;
      min-height:48px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:transform .12s ease, filter .12s ease, opacity .12s ease;
      font-family:"Outfit",system-ui,-apple-system,sans-serif;
    }
    .btn:hover:not(:disabled){transform:translateY(-1px);filter:brightness(1.05)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn.primary{background:var(--accent);color:#022c22}
    .btn.ghost{
      background:transparent;
      border:1px solid rgba(250,204,21,0.35);
      color:#fff;
    }
    .btn.good{
      background:rgba(34,197,94,.14);
      border:1px solid rgba(34,197,94,.35);
      color:#bbf7d0;
    }

    .mini{
      margin-top:10px;
      color:var(--muted);
      font-size:.92rem;
      font-weight:700;
      line-height:1.35;
    }
    .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace}

    .note{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      display:none;
      white-space:pre-wrap;
      line-height:1.35;
      font-weight:850;
    }
    .note.ok{display:block;border-color:rgba(34,197,94,.35);color:#bbf7d0;background:rgba(34,197,94,.08)}
    .note.bad{display:block;border-color:rgba(239,68,68,.35);color:#fecaca;background:rgba(239,68,68,.08)}
    .note.warn{display:block;border-color:rgba(250,204,21,.35);color:#fde68a;background:rgba(250,204,21,.08)}

    .qrbox{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:16px;
      border-radius:16px;
      border:1px dashed rgba(250,204,21,0.35);
      background:rgba(0,0,0,0.12);
      margin-top:12px;
      min-height:220px;
    }
    .qrImg{
      max-width:100%;
      width:320px;
      height:auto;
      border-radius:12px;
      background:#fff;
      padding:10px;
      display:block;
      border:1px solid rgba(148,163,184,.22);
    }

    .brandPreview{
      margin-top:12px;
      border-radius:18px;
      border:1px solid rgba(250,204,21,.28);
      background:
        radial-gradient(circle at 20% 0%, rgba(250,204,21,.18), transparent 38%),
        radial-gradient(circle at 90% 100%, rgba(34,197,94,.16), transparent 45%),
        rgba(2,6,23,.72);
      padding:14px;
    }

    .brandPreviewTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .digiyMark{
      width:42px;
      height:42px;
      border-radius:15px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,#fef3c7,#facc15);
      color:#052e16;
      font-weight:1000;
      box-shadow:0 10px 30px rgba(250,204,21,.18);
    }

    .brandName{
      font-weight:1000;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:#fff7cc;
    }

    .brandLine{
      color:rgba(229,231,235,.78);
      font-size:.88rem;
      font-weight:800;
      margin-top:2px;
    }

    .brandUrl{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,.18);
      background:rgba(0,0,0,.14);
      color:#cbd5e1;
      font-size:.86rem;
      font-weight:800;
      word-break:break-all;
    }

    .label{
      margin-top:10px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,0.12);
      line-height:1.4;
      word-break:break-all;
      font-weight:800;
    }
    .label b{color:#fff}
    .hr{height:1px;background:rgba(148,163,184,0.18);margin-top:12px}
    .pillRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .pill{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:#cbd5e1;
      font-weight:900;
      font-size:.9rem;
    }

    @media (max-width:680px){
      .wrap{padding:14px}
      .qrImg{width:260px}
    }
  </style>
</head>

<body>
<div class="wrap">
  <h1>📎 Mon QR</h1>
  <p>Un seul QR pour ouvrir ton espace, ta fiche publique et ton entrée sécurisée. Tu peux le partager ou l’imprimer.</p>

  <div class="card">
    <div class="pillRow">
      <div class="pill" id="pillSlug">identifiant : —</div>
      <div class="pill" id="pillState">accès : —</div>
    </div>

    <div class="row">
      <button class="btn ghost" id="btnBack" type="button">⬅️ Retour à mon espace</button>
      <button class="btn primary" id="btnCopy" type="button">📋 Copier mon lien</button>
    </div>

    <div class="row">
      <button class="btn good" id="btnOpen" type="button">↗️ Ouvrir mon lien</button>
      <button class="btn primary" id="btnDownload" type="button">⬇️ Télécharger mon QR</button>
      <button class="btn ghost" id="btnSticker" type="button">🟩 Télécharger sticker XL</button>
    </div>

    <div class="qrbox">
      <a id="qrAnchor" href="#" target="_blank" rel="noopener">
        <img id="qrImg" class="qrImg" alt="QR DIGIY" />
      </a>
    </div>

    <div class="brandPreview">
      <div class="brandPreviewTop">
        <div class="row" style="margin:0">
          <div class="digiyMark">∞</div>
          <div>
            <div class="brandName">DIGIYLYFE</div>
            <div class="brandLine">Je loue • accès direct • 0% commission</div>
          </div>
        </div>
        <div class="pill" id="pillPhone">téléphone : —</div>
      </div>
      <div class="brandUrl" id="brandUrl">Lien QR en préparation…</div>
    </div>

    <div class="note warn" id="note"></div>

    <div class="hr"></div>
  </div>
</div>

<script>
(async function(){
  "use strict";

  const QR_PRO_BASE = "https://beauville.github.io/digiy-qr-pro/";

  const qrImg = document.getElementById("qrImg");
  const qrAnchor = document.getElementById("qrAnchor");
  const noteEl = document.getElementById("note");
  const pillSlug = document.getElementById("pillSlug");
  const pillState = document.getElementById("pillState");
  const pillPhone = document.getElementById("pillPhone");
  const brandUrl = document.getElementById("brandUrl");

  const btnDownload = document.getElementById("btnDownload");
  const btnSticker  = document.getElementById("btnSticker");
  const btnBack     = document.getElementById("btnBack");
  const btnCopy     = document.getElementById("btnCopy");
  const btnOpen     = document.getElementById("btnOpen");

  let slug = "";
  let phone = "";
  let url = "";
  let busy = false;
  let qrNormalDataUrl = "";
  let qrXLDataUrl = "";

  function note(msg, type){
    noteEl.className = "note " + (type || "warn");
    noteEl.textContent = msg || "";
    noteEl.style.display = msg ? "block" : "none";
  }

  function setBusy(on){
    busy = !!on;
    btnDownload.disabled = on;
    btnSticker.disabled = on;
    btnCopy.disabled = on;
    btnOpen.disabled = on;
    btnBack.disabled = on;
  }

  function getGuardSession(){
    const st = window.DIGIY_GUARD?.state || {};
    const raw = window.DIGIY_GUARD?.getSession?.() || {};
    return {
      ok: !!st.access_ok,
      phone: String(st.phone || raw.phone || "").trim(),
      slug: String(st.slug || raw.slug || "").trim()
    };
  }

  async function bootGuardSafe(){
    try{
      if(window.DIGIY_GUARD?.ready){
        await window.DIGIY_GUARD.ready();
      }
    }catch(e){
      console.warn("guard ready failed", e);
    }
  }

  function getSlugSafe(){
    const sess = getGuardSession();
    const qsSlug = new URLSearchParams(location.search).get("slug") || "";
    return String(sess.slug || window.DIGIY_GUARD?.state?.slug || qsSlug || "").trim();
  }

  function getPhoneSafe(){
    const sess = getGuardSession();
    const qsTel =
      new URLSearchParams(location.search).get("tel") ||
      new URLSearchParams(location.search).get("phone") || "";
    return String(sess.phone || qsTel || "").trim();
  }

  function buildSafeUrl(path, params){
    let u;
    try{
      u = new URL(path, location.href);
    }catch{
      u = new URL(location.href);
      u.pathname = path;
      u.search = "";
      u.hash = "";
    }
    Object.entries(params || {}).forEach(([k,v]) => {
      if(v == null || v === "") return;
      u.searchParams.set(k, String(v));
    });
    return u.toString();
  }

  function withSlug(path){
    return buildSafeUrl(path, {
      ...(slug ? { slug } : {}),
      ...(phone ? { phone } : {})
    });
  }

  function syncOwnSlug(){
    const u = new URL(location.href);
    if(slug) u.searchParams.set("slug", slug);
    else u.searchParams.delete("slug");

    if(phone) u.searchParams.set("tel", phone);
    else u.searchParams.delete("tel");

    history.replaceState({}, "", u.toString());
  }

  async function copyText(text){
    if(navigator.clipboard?.writeText){
      return navigator.clipboard.writeText(text);
    }
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    let ok = false;
    try{
      ok = document.execCommand("copy");
    }catch(_){}
    ta.remove();
    if(!ok) throw new Error("copy_failed");
  }

  function loadImage(src){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error("image_load_failed"));
      img.src = src;
    });
  }

  function roundRect(ctx, x, y, w, h, r){
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  async function makeBrandedPng(qrDataUrl, size){
    const qr = await loadImage(qrDataUrl);

    const W = size;
    const H = Math.round(size * 1.34);
    const pad = Math.round(size * .07);
    const qrSize = Math.round(size * .70);

    const canvas = document.createElement("canvas");
    canvas.width = W;
    canvas.height = H;

    const ctx = canvas.getContext("2d");

    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, "#020617");
    grad.addColorStop(.55, "#052e16");
    grad.addColorStop(1, "#07140f");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = "rgba(250,204,21,.10)";
    ctx.beginPath();
    ctx.arc(W * .18, H * .10, W * .30, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "rgba(34,197,94,.12)";
    ctx.beginPath();
    ctx.arc(W * .95, H * .82, W * .36, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,.06)";
    roundRect(ctx, pad, pad, W - pad * 2, H - pad * 2, Math.round(size * .05));
    ctx.fill();

    ctx.strokeStyle = "rgba(250,204,21,.42)";
    ctx.lineWidth = Math.max(2, Math.round(size * .004));
    roundRect(ctx, pad, pad, W - pad * 2, H - pad * 2, Math.round(size * .05));
    ctx.stroke();

    ctx.fillStyle = "#fff7cc";
    ctx.textAlign = "center";
    ctx.font = `900 ${Math.round(size * .058)}px Outfit, system-ui, Arial`;
    ctx.fillText("DIGIYLYFE", W / 2, pad + Math.round(size * .095));

    ctx.fillStyle = "rgba(229,231,235,.88)";
    ctx.font = `800 ${Math.round(size * .034)}px Outfit, system-ui, Arial`;
    ctx.fillText("Je loue • accès direct • 0% commission", W / 2, pad + Math.round(size * .145));

    const qx = Math.round((W - qrSize) / 2);
    const qy = pad + Math.round(size * .18);

    ctx.fillStyle = "#ffffff";
    roundRect(ctx, qx - Math.round(size * .025), qy - Math.round(size * .025), qrSize + Math.round(size * .05), qrSize + Math.round(size * .05), Math.round(size * .035));
    ctx.fill();

    ctx.drawImage(qr, qx, qy, qrSize, qrSize);

    ctx.fillStyle = "#facc15";
    ctx.font = `900 ${Math.round(size * .038)}px Outfit, system-ui, Arial`;
    ctx.fillText(slug || "mon-lieu", W / 2, qy + qrSize + Math.round(size * .075));

    ctx.fillStyle = "rgba(229,231,235,.80)";
    ctx.font = `800 ${Math.round(size * .030)}px Outfit, system-ui, Arial`;
    ctx.fillText(phone ? ("Tel : " + phone) : "Scanne pour ouvrir", W / 2, qy + qrSize + Math.round(size * .12));

    ctx.fillStyle = "rgba(203,213,225,.75)";
    ctx.font = `700 ${Math.round(size * .025)}px Outfit, system-ui, Arial`;
    ctx.fillText("Powered by DIGIY", W / 2, H - pad - Math.round(size * .030));

    return canvas.toDataURL("image/png");
  }

  function directDownload(dataUrl, filename){
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  function loadScript(src){
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = src;
      s.async = true;
      s.onload = () => resolve(true);
      s.onerror = () => reject(new Error("script_load_failed: " + src));
      document.head.appendChild(s);
    });
  }

  async function ensureQrLib(){
    // Version blindée offline : aucune dépendance CDN.
    // Le fichier ./qrcode.min.js doit être présent dans le dépôt, à côté de qr.html.
    for(let i = 0; i < 20; i++){
      if(window.QRCode?.toDataURL) return true;
      await new Promise(r => setTimeout(r, 150));
    }

    return !!window.QRCode?.toDataURL;
  }

  function qrOptions(size){
    return {
      width: size,
      margin: 1,
      errorCorrectionLevel: "M",
      color: {
        dark: "#111827",
        light: "#FFFFFF"
      }
    };
  }

  function makeQrDataUrl(text, size){
    return new Promise((resolve, reject) => {
      if(!window.QRCode || typeof window.QRCode.toDataURL !== "function"){
        reject(new Error("QRCode lib missing"));
        return;
      }
      window.QRCode.toDataURL(text, qrOptions(size), (err, dataUrl) => {
        if(err) reject(err);
        else resolve(dataUrl);
      });
    });
  }

  await bootGuardSafe();

  slug = getSlugSafe();
  phone = getPhoneSafe();

  if(!slug){
    alert("❌ Identifiant manquant. Ouvre cette page depuis ton espace.");
    return;
  }

  const sess = getGuardSession();
  pillSlug.textContent = "identifiant : " + slug;
  pillState.textContent = sess.ok
    ? ("accès : ouvert" + (phone ? " · " + phone : ""))
    : "accès : aperçu";

  syncOwnSlug();

  const qrProUrl = new URL(QR_PRO_BASE);
  qrProUrl.searchParams.set("slug", slug);
  qrProUrl.searchParams.set("module", "LOC");
  if (phone) qrProUrl.searchParams.set("tel", phone);

  const appUrl = new URL("./app.html", location.href);
  appUrl.searchParams.set("slug", slug);

  const publicUrl = new URL("./fiche.html", location.href);
  publicUrl.searchParams.set("slug", slug);

  qrProUrl.searchParams.set("return", appUrl.toString());
  qrProUrl.searchParams.set("public", publicUrl.toString());

  url = qrProUrl.toString();

  if (brandUrl) brandUrl.textContent = url;
  if (pillPhone) pillPhone.textContent = "téléphone : " + (phone || "—");

  qrAnchor.href = url;
  note("⏳ Préparation du QR local…", "warn");
  setBusy(true);

  try{
    const ok = await ensureQrLib();
    if(!ok){
      throw new Error("Librairie QR introuvable");
    }

    const rawNormal = await makeQrDataUrl(url, 520);
    const rawXL = await makeQrDataUrl(url, 900);

    qrNormalDataUrl = await makeBrandedPng(rawNormal, 900);
    qrXLDataUrl = await makeBrandedPng(rawXL, 1400);

    qrImg.onload = () => {
      note("✅ Ton QR est prêt. Teste-le au téléphone avant impression.", "ok");
    };

    qrImg.onerror = () => {
      note("❌ Impossible d’afficher l’image QR locale.", "bad");
    };

    qrImg.src = qrNormalDataUrl;
  }catch(e){
    console.error(e);
    note("❌ Génération QR locale impossible : " + (e?.message || e) + "\n\nVérifie que le fichier qrcode.min.js est bien présent à côté de qr.html dans le dépôt.", "bad");
  }finally{
    setBusy(false);
  }

  btnBack.onclick = () => {
    location.href = withSlug("./app.html");
  };

  btnCopy.onclick = async () => {
    try{
      await copyText(url);
      note("✅ Ton lien a bien été copié.", "ok");
    }catch(e){
      console.error(e);
      note("⚠️ La copie a été bloquée. Copie manuelle dans le lien affiché.", "warn");
    }
  };

  btnOpen.onclick = () => {
    window.open(url, "_blank", "noopener");
  };

  btnDownload.onclick = async () => {
    if(busy) return;
    if(!qrNormalDataUrl){
      note("❌ Le QR n’est pas encore prêt.", "bad");
      return;
    }
    setBusy(true);
    try{
      note("⏳ Préparation du PNG…", "warn");
      directDownload(qrNormalDataUrl, `DIGIY_QR_PRO_LOC_${slug}.png`);
      note("⬇️ Téléchargement lancé.", "ok");
    }catch(e){
      console.error(e);
      note("❌ Téléchargement impossible : " + (e?.message || e), "bad");
    }finally{
      setBusy(false);
    }
  };

  btnSticker.onclick = async () => {
    if(busy) return;
    if(!qrXLDataUrl){
      note("❌ Le sticker XL n’est pas encore prêt.", "bad");
      return;
    }
    setBusy(true);
    try{
      note("🟩 Préparation du sticker XL…", "warn");
      directDownload(qrXLDataUrl, `DIGIY_STICKER_XL_LOC_${slug}.png`);
      note("⬇️ Sticker XL téléchargé.", "ok");
    }catch(e){
      console.error(e);
      note("❌ Sticker XL impossible : " + (e?.message || e), "bad");
    }finally{
      setBusy(false);
    }
  };

})();
</script>
</body>
</html>
