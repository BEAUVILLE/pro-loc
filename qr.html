<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex,nofollow"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07140f" />
  <title>DIGIY LOC — QR logement</title>

  <script>
    window.DIGIY_MODULE       = "LOC";
    window.DIGIY_ABOS_MODULE  = "LOC";
    window.DIGIY_MODULE_LABEL = "Je loue";
    window.DIGIY_LOGIN_URL    = "./pin.html";
    window.DIGIY_PUBLIC_BASE_URL = window.DIGIY_PUBLIC_BASE_URL || "https://loc.digiylyfe.com/";
    window.DIGIY_SUPABASE_URL      = window.DIGIY_SUPABASE_URL || "https://wesqmwjjtsefyjnluosj.supabase.co";
    window.DIGIY_SUPABASE_ANON_KEY = window.DIGIY_SUPABASE_ANON_KEY || "sb_publishable_tGHItRgeWDmGjnd0CK1DVQ_BIep4Ug3";
    window.DIGIY_SUPABASE_ANON     = window.DIGIY_SUPABASE_ANON || window.DIGIY_SUPABASE_ANON_KEY;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./guard.js?v=loc-guard-20260531"></script>

  <style>
    body{margin:0;font-family:Arial,system-ui,sans-serif;background:#07140f;color:#ecfff4;padding:16px;text-align:center;font-weight:800}
    .card{max-width:560px;margin:auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:26px;padding:22px;box-shadow:0 22px 70px rgba(0,0,0,.38)}
    h1{font-size:34px;margin:10px 0;line-height:1}.top{color:#facc15;font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:900}
    p{color:rgba(236,255,244,.75);line-height:1.5}.qr{background:white;border-radius:22px;padding:18px;margin:18px auto;color:#07140f}.qr img{width:100%;max-width:340px;border-radius:16px}
    .btn{display:block;margin:10px 0;padding:15px;border-radius:18px;background:#22c55e;color:#041b12;font-weight:900;text-decoration:none;border:0;width:100%;box-sizing:border-box;font-size:16px}.btn.gold{background:#facc15;color:#241a00}.btn.blue{background:#38bdf8;color:#061826}.btn.dark{background:rgba(255,255,255,.08);color:#ecfff4;border:1px solid rgba(255,255,255,.14)}
    .small{font-size:13px;color:rgba(236,255,244,.65);word-break:break-all}.pill{display:inline-block;margin:4px 3px;padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);font-size:12px;color:#fff0a8}.note{display:none;margin-top:12px;padding:12px;border-radius:16px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fde68a;font-size:14px;line-height:1.45;white-space:pre-wrap;text-align:left}.note.ok{display:block;color:#bbf7d0;border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.10)}.note.warn{display:block}.note.bad{display:block;color:#fecaca;border-color:rgba(251,113,133,.25);background:rgba(251,113,133,.10)}
    @media print{body{background:#fff;color:#111}.card{box-shadow:none;border:0}.btn,.small,.top,p,.note,.pillRow{display:none}.qr{padding:0}.qr img{max-width:430px}}
  </style>
</head>
<body>
  <main class="card">
    <div class="top">DIGIY LOC · QR TERRAIN</div>
    <h1 id="title">QR logement</h1>
    <p id="subtitle">Scanne le QR pour ouvrir la fiche logement côté client. Le lien public reste propre ; l’espace PRO reste protégé par PIN.</p>
    <div class="pillRow"><span class="pill" id="sessionPill">session…</span><span class="pill" id="publicPill">slug public…</span></div>
    <div class="qr"><img id="qrImg" alt="QR logement DIGIY LOC" src="" /><strong id="qrLabel">Mon logement</strong><br><span>BY DIGIYLYFE</span></div>
    <a class="btn" id="openFiche" href="#" target="_blank" rel="noopener">🏠 Ouvrir fiche client</a>
    <a class="btn blue" id="openProFiche" href="./fiche.html">🪪 Ouvrir ma fiche PRO</a>
    <button class="btn gold" id="printBtn" type="button">🖨️ Imprimer le QR</button>
    <button class="btn gold" id="copyBtn" type="button">📋 Copier lien fiche</button>
    <a class="btn dark" href="./app.html">← Retour accueil</a>
    <p class="small" id="targetUrl"></p><div class="note warn" id="note"></div>
  </main>

  <script>
    (async function(){
      "use strict";
      const MODULE = "LOC";
      const TABLE = "digiy_loc_public_fiches";
      const PUBLIC_BASE = String(window.DIGIY_PUBLIC_BASE_URL || "https://loc.digiylyfe.com/");
      const LOGIN_URL = String(window.DIGIY_LOGIN_URL || "./pin.html");
      const $ = id => document.getElementById(id);
      const safe = v => String(v || "").trim();
      const digits = v => String(v || "").replace(/\D/g,"");
      function normalizeSlug(v){return String(v||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"").replace(/-+/g,"-").replace(/^-|-$/g,"");}
      function isPublicSlugSensitive(v){const s=safe(v); if(!s) return true; if(/\d{7,}/.test(s)) return true; if(/token|session|pin|phone|tel|whatsapp/i.test(s)) return true; return false;}
      function note(msg,type){$("note").className="note "+(type||"warn");$("note").textContent=msg||"";$("note").style.display=msg?"block":"none";}
      function qrApi(value,size){const s=Math.max(160,Number(size)||520);return "https://api.qrserver.com/v1/create-qr-code/?size="+s+"x"+s+"&margin=18&data="+encodeURIComponent(value);}
      function publicFicheUrl(slug){const s=normalizeSlug(slug);if(!s||isPublicSlugSensitive(s)) return "";const u=new URL("fiche.html",PUBLIC_BASE);u.searchParams.set("slug",s);return u.toString();}
      function isAccessOk(st){return !!(st && [st.access_ok,st.access,st.ok,st.pin_session_ok].some(v=>v===true||String(v).toLowerCase()==="true"||String(v)==="1"));}
      function storageGet(k){try{return sessionStorage.getItem(k)||localStorage.getItem(k)||"";}catch(_){return "";}}
      function readParam(name){try{return safe(new URL(location.href).searchParams.get(name));}catch(_){return "";}}
      function cleanVisibleUrl(){try{const url=new URL(location.href);let changed=false;["phone","tel","p_phone","owner_phone","owner_id","loc_phone","whatsapp","msisdn","pin","pin4","token","session_token","module","return","redirect","redirect_url","url","from","v"].forEach(k=>{if(url.searchParams.has(k)){url.searchParams.delete(k);changed=true;}});const s=normalizeSlug(url.searchParams.get("slug")||"");if(s&&isPublicSlugSensitive(s)){url.searchParams.delete("slug");changed=true;}if(changed) history.replaceState({},document.title,url.pathname+url.search+url.hash);}catch(_){}}
      function goPin(reason){try{sessionStorage.setItem("DIGIY_LOC_RETURN_AFTER_PIN","qr.html");if(reason) sessionStorage.setItem("DIGIY_LOC_PIN_REASON",reason);}catch(_){}document.body.innerHTML='<main style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#07140f;color:#ecfff4;font-family:system-ui,sans-serif;text-align:center"><div><h1>🔐 Retour PIN</h1><p style="font-weight:800">Session ou slug LOC absent. On repasse par le coffre.</p></div></main>';setTimeout(()=>location.replace(LOGIN_URL),250);}
      async function waitGuard(){try{const guard=window.DIGIY_GUARD;if(!guard) return {};if(typeof guard.ready==="function"){const out=guard.ready({redirect:false,preserve_validation:true});if(out&&typeof out.then==="function") await out;}else if(guard.ready&&typeof guard.ready.then==="function"){await guard.ready;}if(typeof guard.getSession==="function") return guard.getSession()||guard.state||{};return guard.state||{};}catch(e){console.warn("[LOC QR] guard",e);return {};}}
      function readSession(st){const raw=st||{};const internalSlug=normalizeSlug(readParam("slug")||raw.loc_slug||raw.slug||raw.internal_slug||raw.subscription_slug||storageGet("digiy_loc_slug")||storageGet("digiy_loc_last_slug")||storageGet("DIGIY_LOC_SLUG")||storageGet("DIGIY_SLUG"));const publicSlug=normalizeSlug(readParam("public_slug")||raw.public_slug||raw.slug_public||raw.fiche_slug||storageGet("digiy_loc_public_slug")||storageGet("DIGIY_LOC_PUBLIC_SLUG"));const phone=digits(raw.phone||raw.tel||raw.whatsapp||raw.loc_phone||storageGet("digiy_loc_phone")||storageGet("DIGIY_LOC_PHONE")||storageGet("DIGIY_PHONE"));return{access:isAccessOk(raw),internalSlug,publicSlug,phone};}
      async function fetchRemote(session){if(!window.supabase?.createClient) return null;const client=window.supabase.createClient(window.DIGIY_SUPABASE_URL, window.DIGIY_SUPABASE_ANON_KEY||window.DIGIY_SUPABASE_ANON);const candidates=[session.internalSlug,session.publicSlug,session.phone].filter(Boolean);for(const c of candidates){let query=client.from(TABLE).select("*").eq("module",MODULE).eq("is_active",true).in("status",["published","active"]);if(/^\d+$/.test(c)){query=query.or(`phone.eq.${c},whatsapp.eq.${c}`);}else{query=query.or(`slug.eq.${c},public_slug.eq.${c},internal_slug.eq.${c},loc_slug.eq.${c}`);}const {data,error}=await query.limit(1).maybeSingle();if(!error&&data) return data;}return null;}
      function setPills(access, publicSlug){$("sessionPill").textContent=access?"session LOC ouverte":"slug LOC reconnu";$("publicPill").textContent=publicSlug?"public : "+publicSlug:"public absent";}
      async function copyText(text){if(navigator.clipboard?.writeText) return navigator.clipboard.writeText(text);const ta=document.createElement("textarea");ta.value=text;ta.setAttribute("readonly","");ta.style.position="fixed";ta.style.left="-9999px";document.body.appendChild(ta);ta.select();let ok=false;try{ok=document.execCommand("copy");}catch(_){}ta.remove();if(!ok) throw new Error("copy_failed");}
      function saveHints(row, session, publicSlug){try{if(session.internalSlug){localStorage.setItem("digiy_loc_slug",session.internalSlug);localStorage.setItem("digiy_loc_last_slug",session.internalSlug);}if(publicSlug)localStorage.setItem("digiy_loc_public_slug",publicSlug);const phone=digits(row?.phone||row?.whatsapp||session.phone||"");if(phone)localStorage.setItem("digiy_loc_phone",phone);}catch(_){}}
      async function boot(){cleanVisibleUrl();const state=await waitGuard();const session=readSession(state);if(!session.internalSlug&&!session.publicSlug){goPin("slug_absent");return;}const row=await fetchRemote(session);let publicSlug=normalizeSlug(row?.public_slug||row?.slug||session.publicSlug||"");if(!publicSlug && session.internalSlug && !isPublicSlugSensitive(session.internalSlug)) publicSlug=session.internalSlug;if(!publicSlug || isPublicSlugSensitive(publicSlug)){goPin("public_slug_absent");return;}const target=safe(row?.fiche_url)||publicFicheUrl(publicSlug);if(!target){goPin("target_absent");return;}const label=safe(row?.business_name||row?.name)||"Mon logement";$("qrLabel").textContent=label;$("title").textContent="QR " + label;$("targetUrl").textContent=target;$("openFiche").href=target;$("openProFiche").href="./fiche.html"+(session.internalSlug?"?slug="+encodeURIComponent(session.internalSlug):"");$("qrImg").src=qrApi(target,520);setPills(session.access,publicSlug);saveHints(row,session,publicSlug);note(row?"✅ QR LOC prêt depuis Supabase. Il ouvre la fiche client propre.":"⚠️ QR LOC prêt en lecture locale. Supabase n’a pas confirmé la fiche.",row?"ok":"warn");$("printBtn").addEventListener("click",()=>window.print());$("copyBtn").addEventListener("click",async()=>{try{await copyText(target);note("✅ Lien fiche LOC copié.","ok");}catch(_){note("Copie bloquée. Copie le lien affiché à la main.","warn");}});}
      boot();
    })();
  </script>
</body>
</html>
